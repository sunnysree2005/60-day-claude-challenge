<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognitive Pattern Explorer</title>
<style>
  :root{
    --bg: #EEF2EF;
    --bg-2: #E3EAE5;
    --ink: #26332F;
    --ink-soft: #55635E;
    --sage: #7FA88F;
    --sage-deep: #5C8873;
    --clay: #D9A886;
    --clay-deep: #C68A5F;
    --card: #FBFCFA;
    --line: rgba(38,51,47,0.12);
    --shadow: 0 12px 30px rgba(38,51,47,0.08);
    --radius: 18px;
    --dur: 420ms;
    --ease: cubic-bezier(.22,.61,.36,1);
    --font-display: "Iowan Old Style","Palatino Linotype","Book Antiqua", Georgia, serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }

  [data-mode="stress"]{
    --bg: #F1ECEA;
    --bg-2: #EDE2DE;
    --sage: #C6876A;
    --sage-deep: #A66748;
    --clay: #93A9A0;
    --clay-deep: #728E82;
    --dur: 260ms;
  }

  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow-x:hidden;
    transition: background var(--dur) var(--ease);
  }
  h1,h2,h3{ font-family: var(--font-display); font-weight:600; margin:0 0 .4em; letter-spacing:.2px; }
  p{ margin:0 0 1em; color: var(--ink-soft); line-height:1.6; }
  button{ font-family: inherit; }
  a{ color: var(--sage-deep); }

  .visually-hidden{
    position:absolute !important; width:1px; height:1px; padding:0; margin:-1px;
    overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }

  /* ambient background */
  #ambient{
    position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
  }
  #ambient span{
    position:absolute; border-radius:50%;
    background: radial-gradient(circle at 30% 30%, rgba(127,168,143,0.35), rgba(127,168,143,0) 70%);
    animation: drift var(--drift-dur,26s) linear infinite;
    opacity:.6;
  }
  [data-mode="stress"] #ambient span{
    background: radial-gradient(circle at 30% 30%, rgba(198,135,106,0.4), rgba(198,135,106,0) 70%);
  }
  @keyframes drift{
    0%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(30px,-40px) scale(1.08); }
    100%{ transform: translate(0,0) scale(1); }
  }

  .app{
    position:relative; z-index:1;
    min-height:100vh;
    display:flex; flex-direction:column;
    align-items:center;
    padding: 24px 18px 64px;
  }

  .shell{
    width:100%; max-width: 760px;
  }

  /* progress bar */
  .progress{
    display:flex; gap:8px; align-items:center; justify-content:center;
    margin: 0 auto 28px; max-width: 760px; width:100%;
    padding: 0 4px;
  }
  .progress .seg{
    flex:1; height:6px; border-radius:4px; background: var(--line);
    overflow:hidden; position:relative;
  }
  .progress .seg > i{
    display:block; height:100%; width:0%; background: linear-gradient(90deg,var(--sage),var(--sage-deep));
    border-radius:4px; transition: width calc(var(--dur)*1.4) var(--ease);
  }
  .progress .seg.done > i{ width:100%; }
  .progress .seg.current > i{ width:50%; }
  .progress-label{
    text-align:center; font-size:.78rem; letter-spacing:.08em; text-transform:uppercase;
    color: var(--ink-soft); margin-bottom:18px;
  }

  /* screens */
  .screen{
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 34px 30px;
    animation: rise var(--dur) var(--ease);
  }
  @keyframes rise{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .screen.leaving{
    animation: fall var(--dur) var(--ease) forwards;
  }
  @keyframes fall{
    to{ opacity:0; transform: translateY(-10px); }
  }

  .eyebrow{
    font-size:.75rem; letter-spacing:.14em; text-transform:uppercase; color: var(--sage-deep);
    font-weight:600; margin-bottom:10px; display:block;
  }

  .scenario{
    background: var(--bg-2); border-radius: 14px; padding: 18px 20px; margin: 18px 0 20px;
    border: 1px solid var(--line);
  }
  .scenario p{ margin:0; color: var(--ink); font-style: italic; }

  .options{ display:flex; flex-direction:column; gap:10px; }
  .option{
    text-align:left; width:100%; padding:14px 16px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    cursor:pointer; font-size: .96rem; line-height:1.45;
    transition: transform .18s var(--ease), border-color .18s var(--ease), background .18s var(--ease);
  }
  .option:hover{ transform: translateY(-2px); border-color: var(--sage); }
  .option:focus-visible{ outline: 3px solid var(--sage-deep); outline-offset:2px; }
  .option.selected{ background: linear-gradient(0deg, rgba(127,168,143,.14), rgba(127,168,143,.14)), var(--card); border-color: var(--sage-deep); }

  .nav-row{
    display:flex; justify-content:space-between; align-items:center; margin-top: 26px; gap:12px;
  }
  .btn{
    padding: 12px 22px; border-radius: 999px; border:none; cursor:pointer;
    font-weight:600; font-size:.92rem; letter-spacing:.02em;
    transition: transform .18s var(--ease), box-shadow .18s var(--ease), opacity .18s;
  }
  .btn:focus-visible{ outline: 3px solid var(--ink); outline-offset:2px; }
  .btn-primary{ background: linear-gradient(135deg, var(--sage), var(--sage-deep)); color:#fff; box-shadow: 0 8px 20px rgba(92,136,115,.35); }
  .btn-primary:hover{ transform: translateY(-2px); }
  .btn-primary:disabled{ opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn-ghost{ background: transparent; color: var(--ink-soft); border:1px solid var(--line); }
  .btn-ghost:hover{ border-color: var(--sage); color:var(--ink); }

  /* start screen */
  .start-hero{ text-align:center; padding: 10px 6px 6px; }
  .start-hero h1{ font-size: clamp(1.8rem, 4vw, 2.5rem); }
  .mode-toggle{
    display:flex; gap:10px; justify-content:center; margin: 22px 0 6px; flex-wrap:wrap;
  }
  .mode-btn{
    padding: 12px 20px; border-radius: 14px; border:1px solid var(--line);
    background: var(--bg-2); cursor:pointer; text-align:left; min-width:170px;
    transition: border-color .18s, transform .18s;
  }
  .mode-btn strong{ display:block; font-size:.95rem; margin-bottom:2px; }
  .mode-btn span{ font-size:.8rem; color: var(--ink-soft); }
  .mode-btn[aria-pressed="true"]{ border-color: var(--sage-deep); background: linear-gradient(0deg, rgba(127,168,143,.16), rgba(127,168,143,.16)), var(--bg-2); }
  .mode-btn:hover{ transform: translateY(-2px); }
  .mode-btn:focus-visible{ outline: 3px solid var(--sage-deep); outline-offset:2px; }

  /* Chapter 2: priority cards (rank list) */
  .rank-instructions{ font-size:.85rem; margin-bottom: 14px; }
  .rank-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px; }
  .rank-item{
    display:flex; align-items:center; gap:12px;
    background: var(--bg-2); border:1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; cursor:grab; touch-action:none; user-select:none;
    transition: box-shadow .18s var(--ease), transform .18s var(--ease), border-color .18s;
  }
  .rank-item.dragging{ box-shadow: 0 14px 28px rgba(38,51,47,.18); transform: scale(1.02); cursor:grabbing; z-index:5; }
  .rank-item.keyboard-active{ border-color: var(--sage-deep); box-shadow: 0 0 0 3px rgba(92,136,115,.25); }
  .rank-item:focus-visible{ outline: 3px solid var(--sage-deep); outline-offset:2px; }
  .rank-handle{ font-size:1.1rem; color: var(--ink-soft); line-height:1; }
  .rank-order{
    width:26px; height:26px; border-radius:50%; background: var(--sage); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:.8rem; font-weight:700; flex-shrink:0;
  }
  .rank-text{ flex:1; font-size:.94rem; }
  .rank-move-buttons{ display:flex; gap:4px; }
  .rank-move-buttons button{
    width:28px; height:28px; border-radius:8px; border:1px solid var(--line); background:var(--card);
    cursor:pointer; font-size:.8rem; color: var(--ink-soft);
  }
  .rank-move-buttons button:hover{ border-color: var(--sage); color: var(--ink); }
  .rank-move-buttons button:focus-visible{ outline: 3px solid var(--sage-deep); outline-offset:1px; }

  /* Chapter 3: timeline */
  .timeline-wrap{ margin: 20px 0; }
  .timeline{
    display:flex; gap:10px; margin-bottom:20px; position:relative;
    flex-wrap:wrap;
  }
  .timeline-stage{
    flex:1 1 140px; min-width:140px;
    border: 2px dashed var(--line); border-radius: 14px; padding:14px 12px;
    min-height:120px; background: var(--bg-2);
    display:flex; flex-direction:column; gap:8px;
    transition: border-color .18s, background .18s;
  }
  .timeline-stage.dragover{ border-color: var(--sage-deep); background: rgba(127,168,143,.14); }
  .timeline-stage.kb-target{ border-color: var(--clay-deep); }
  .timeline-stage h3{ font-size:.82rem; text-transform:uppercase; letter-spacing:.06em; color: var(--sage-deep); margin-bottom:4px; }
  .timeline-stage .stage-hint{ font-size:.72rem; color: var(--ink-soft); }
  .chip-pool{
    display:flex; flex-wrap:wrap; gap:10px; padding:14px; border-radius:14px; background: var(--bg-2); border:1px solid var(--line);
  }
  .chip{
    padding: 9px 14px; border-radius: 999px; background: var(--card); border:1px solid var(--line);
    font-size:.85rem; cursor:grab; touch-action:none; user-select:none;
    transition: box-shadow .18s var(--ease), transform .18s var(--ease), border-color .18s;
  }
  .chip:hover{ border-color: var(--sage); }
  .chip.dragging{ box-shadow: 0 14px 24px rgba(38,51,47,.2); transform: scale(1.05); cursor:grabbing; }
  .chip.picked{ border-color: var(--clay-deep); background: rgba(217,168,134,.18); }
  .chip:focus-visible{ outline: 3px solid var(--sage-deep); outline-offset:2px; }
  .chip.placed{ opacity:.55; cursor:default; }

  .kb-hint{ font-size:.72rem; color: var(--ink-soft); margin-top:6px; }

  /* Final journal */
  .bloom-wrap{ display:flex; justify-content:center; margin: 6px 0 20px; }
  .breakdown{ display:flex; flex-direction:column; gap:10px; margin: 18px 0; }
  .breakdown-row{ display:flex; align-items:center; gap:12px; }
  .breakdown-label{ width:150px; font-size:.85rem; flex-shrink:0; }
  .breakdown-bar{ flex:1; height:10px; border-radius:6px; background: var(--line); overflow:hidden; }
  .breakdown-bar > i{ display:block; height:100%; border-radius:6px; background: linear-gradient(90deg,var(--sage),var(--sage-deep)); transition: width 900ms var(--ease); }
  .breakdown-pct{ width:42px; text-align:right; font-size:.85rem; color: var(--ink-soft); font-variant-numeric: tabular-nums; }

  .insight-card{
    background: var(--bg-2); border:1px solid var(--line); border-radius:14px; padding:18px 20px; margin: 20px 0;
  }
  .insight-card h3{ font-size:1.05rem; }

  textarea.journal-input{
    width:100%; min-height:110px; border-radius:12px; border:1px solid var(--line);
    padding:14px; font-family: var(--font-body); font-size:.92rem; resize:vertical;
    background: var(--card); color: var(--ink);
  }
  textarea.journal-input:focus-visible{ outline: 3px solid var(--sage-deep); outline-offset:2px; }

  .restart-row{ margin-top: 22px; text-align:center; }

  footer.note{
    max-width:760px; margin: 22px auto 0; text-align:center; font-size:.72rem; color: var(--ink-soft); opacity:.8;
  }

  @media (max-width: 560px){
    .screen{ padding: 26px 18px; }
    .breakdown-label{ width:110px; font-size:.78rem; }
    .rank-text{ font-size:.88rem; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
    #ambient span{ animation: none; opacity:.3; }
  }
</style>
</head>
<body>

<div id="ambient" aria-hidden="true"></div>

<main class="app">
  <div class="shell">
    <div class="progress" id="progressBar" role="progressbar" aria-valuemin="0" aria-valuemax="4" aria-valuenow="0" aria-label="Journey progress"></div>
    <div class="progress-label" id="progressLabel">Start</div>
    <div id="screenHost"></div>
  </div>
  <footer class="note">This is a self-reflection tool for curiosity and learning, not a clinical or diagnostic assessment.</footer>
</main>

<script>
(function(){
  "use strict";

  /* ---------------------------------------------------------
     DATA
  --------------------------------------------------------- */

  var TENDENCIES = {
    analytical:  { name: "Analytical Thinker", desc: "You tend to break things into parts, weigh evidence, and look for the logic beneath a situation before deciding anything." },
    emotional:   { name: "Emotional Intuitive", desc: "You tend to lead with feeling and instinct — your gut often notices what's true before your head catches up." },
    overthink:   { name: "Overthinking Loop Style", desc: "You tend to circle a decision from many angles, replaying it until it feels fully examined, which can bring depth but also delay." },
    action:      { name: "Action-First Decision Maker", desc: "You tend to move quickly from thought to action, trusting momentum and adjusting course as you go." },
    balanced:    { name: "Balanced Reflective Thinker", desc: "You tend to blend logic and feeling, pausing just long enough to reflect before acting with steadiness." }
  };

  var TENDENCY_KEYS = ["analytical","emotional","overthink","action","balanced"];

  // Chapter 1: scenario questions. Each option scores one or two tendencies.
  var SCENARIOS = [
    {
      text: "A close friend cancels plans at the last minute for the third time this month.",
      options: [
        { label: "I think through possible reasons before reacting — maybe something's going on in their life.", scores: { analytical: 2, balanced: 1 } },
        { label: "I feel a sting of hurt right away and it colors how I respond to them.", scores: { emotional: 2 } },
        { label: "I replay the last few times in my head, wondering what it says about the friendship.", scores: { overthink: 2 } },
        { label: "I text back something light and move on with my day.", scores: { action: 2 } }
      ]
    },
    {
      text: "You're offered a new opportunity at work with an unclear but tight deadline to decide.",
      options: [
        { label: "I list out pros and cons before saying anything.", scores: { analytical: 2 } },
        { label: "I go with how it feels in my body — excited or uneasy — as my first signal.", scores: { emotional: 2 } },
        { label: "I keep turning it over, imagining every possible outcome, even after I've decided.", scores: { overthink: 2 } },
        { label: "I say yes quickly and figure out the details as I go.", scores: { action: 2, balanced: 1 } }
      ]
    },
    {
      text: "A conversation with someone leaves you slightly unsettled, though nothing was clearly wrong.",
      options: [
        { label: "I try to identify exactly what was said that caused the feeling.", scores: { analytical: 2 } },
        { label: "I sit with the discomfort and trust that my feelings are picking up on something real.", scores: { emotional: 2, balanced: 1 } },
        { label: "I mentally replay the whole conversation multiple times looking for what went wrong.", scores: { overthink: 2 } },
        { label: "I shrug it off and focus on what's next.", scores: { action: 2 } }
      ]
    },
    {
      text: "You need to make a decision that affects someone else, and there's no clearly 'right' answer.",
      options: [
        { label: "I gather information and think about likely consequences for each option.", scores: { analytical: 2 } },
        { label: "I imagine how each choice would feel for the people involved, myself included.", scores: { emotional: 2 } },
        { label: "I get stuck weighing every angle, worried I'll choose wrong.", scores: { overthink: 2 } },
        { label: "I check in briefly with my instinct and the facts, then choose and move forward.", scores: { balanced: 2 } }
      ]
    },
    {
      text: "You make a small mistake at something you care about.",
      options: [
        { label: "I analyze exactly what went wrong so it doesn't happen again.", scores: { analytical: 2 } },
        { label: "I feel it strongly for a while before I can think clearly again.", scores: { emotional: 2 } },
        { label: "I keep re-examining the moment long after it's over.", scores: { overthink: 2 } },
        { label: "I note it, adjust, and keep going without dwelling.", scores: { action: 2, balanced: 1 } }
      ]
    }
  ];

  // Chapter 2: priority cards to be ranked, highest priority first.
  var PRIORITY_CARDS = [
    { id:"logic", text:"Having a clear, logical reason before I act", weight:{ analytical: 1 } },
    { id:"feel", text:"Trusting how something feels, even without full proof", weight:{ emotional: 1 } },
    { id:"speed", text:"Moving quickly rather than waiting for certainty", weight:{ action: 1 } },
    { id:"thorough", text:"Considering every possible angle before deciding", weight:{ overthink: 1 } },
    { id:"balance", text:"Finding a steady middle ground between thinking and feeling", weight:{ balanced: 1 } }
  ];

  // Chapter 3: timeline stages and draggable descriptor chips.
  var TIMELINE_STAGES = [
    { id:"trigger", label:"The Trigger", hint:"What starts the moment" },
    { id:"reaction", label:"First Reaction", hint:"What happens right away" },
    { id:"reflection", label:"Reflection", hint:"What happens while thinking it over" },
    { id:"decision", label:"The Decision", hint:"What happens when you act" }
  ];

  var TIMELINE_CHIPS = [
    { id:"c1", text:"I pause to gather facts", stage:"reflection", scores:{ analytical:2 } },
    { id:"c2", text:"A strong gut feeling shows up", stage:"reaction", scores:{ emotional:2 } },
    { id:"c3", text:"I replay it many times before moving on", stage:"reflection", scores:{ overthink:2 } },
    { id:"c4", text:"I act almost immediately", stage:"decision", scores:{ action:2 } },
    { id:"c5", text:"I notice a small shift in my mood", stage:"trigger", scores:{ emotional:1 } },
    { id:"c6", text:"I weigh a few options calmly, then choose", stage:"decision", scores:{ balanced:2 } },
    { id:"c7", text:"Something unexpected happens", stage:"trigger", scores:{ } },
    { id:"c8", text:"I ask myself 'what does the evidence say?'", stage:"reflection", scores:{ analytical:1 } }
  ];

  /* ---------------------------------------------------------
     STATE
  --------------------------------------------------------- */

  var state = {
    mode: "calm",
    step: 0, // 0 start, 1 ch1, 2 ch2, 3 ch3, 4 final
    scores: { analytical:0, emotional:0, overthink:0, action:0, balanced:0 },
    ch1Answers: new Array(SCENARIOS.length).fill(null),
    ch1Index: 0,
    ch2Order: PRIORITY_CARDS.map(function(c){ return c.id; }),
    ch3Placements: {}, // chipId -> stageId
    journalText: ""
  };

  var STEP_LABELS = ["Start", "Chapter 1 · Discover Your Thinking Style", "Chapter 2 · Choose Your Priorities", "Chapter 3 · Map Your Thinking", "Final Reflection Journal"];

  var host = document.getElementById("screenHost");
  var progressBar = document.getElementById("progressBar");
  var progressLabel = document.getElementById("progressLabel");

  function addScore(scoresObj){
    if(!scoresObj) return;
    for(var k in scoresObj){
      if(state.scores.hasOwnProperty(k)) state.scores[k] += scoresObj[k];
    }
  }

  /* ---------------------------------------------------------
     AMBIENT BACKGROUND
  --------------------------------------------------------- */
  function buildAmbient(){
    var wrap = document.getElementById("ambient");
    wrap.innerHTML = "";
    var count = 7;
    for(var i=0;i<count;i++){
      var s = document.createElement("span");
      var size = 120 + Math.random()*220;
      s.style.width = size+"px";
      s.style.height = size+"px";
      s.style.left = (Math.random()*100)+"%";
      s.style.top = (Math.random()*100)+"%";
      s.style.setProperty("--drift-dur", (18 + Math.random()*18)+"s");
      s.style.animationDelay = (Math.random()*-20)+"s";
      wrap.appendChild(s);
    }
  }

  /* ---------------------------------------------------------
     PROGRESS BAR
  --------------------------------------------------------- */
  function renderProgress(){
    progressBar.innerHTML = "";
    var totalSegs = 4; // ch1, ch2, ch3, final
    progressBar.setAttribute("aria-valuenow", String(Math.max(0,state.step-0)));
    for(var i=1;i<=totalSegs;i++){
      var seg = document.createElement("div");
      seg.className = "seg";
      if(state.step > i) seg.classList.add("done");
      else if(state.step === i) seg.classList.add("current");
      var inner = document.createElement("i");
      seg.appendChild(inner);
      progressBar.appendChild(seg);
    }
    progressLabel.textContent = STEP_LABELS[state.step];
  }

  /* ---------------------------------------------------------
     SCREEN TRANSITION HELPER
  --------------------------------------------------------- */
  function setScreen(renderFn){
    var old = host.firstElementChild;
    function place(){
      host.innerHTML = "";
      var el = document.createElement("div");
      el.className = "screen";
      renderFn(el);
      host.appendChild(el);
      renderProgress();
      var focusTarget = el.querySelector("[data-autofocus]") || el.querySelector("h1, h2");
      if(focusTarget){ focusTarget.setAttribute("tabindex","-1"); focusTarget.focus({preventScroll:true}); }
      window.scrollTo({top:0, behavior: prefersReducedMotion() ? "auto" : "smooth"});
    }
    if(old){
      old.classList.add("leaving");
      setTimeout(place, prefersReducedMotion() ? 0 : 260);
    } else {
      place();
    }
  }

  function prefersReducedMotion(){
    return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  }

  /* ---------------------------------------------------------
     SCREEN 0: START
  --------------------------------------------------------- */
  function renderStart(el){
    el.innerHTML =
      '<div class="start-hero">' +
        '<span class="eyebrow">A quiet self-reflection journey</span>' +
        '<h1 data-autofocus>Cognitive Pattern Explorer</h1>' +
        '<p>Wander through a few gentle scenarios, sort some priorities, and map out how you move from thought to action. At the end you\'ll get a personal, reflective snapshot — not a label, just a mirror.</p>' +
      '</div>' +
      '<div class="mode-toggle" role="group" aria-label="Choose a pacing mode">' +
        '<button type="button" class="mode-btn" data-mode-btn="calm" aria-pressed="'+(state.mode==="calm")+'"><strong>Calm Mode</strong><span>Slower pace, softer tones</span></button>' +
        '<button type="button" class="mode-btn" data-mode-btn="stress" aria-pressed="'+(state.mode==="stress")+'"><strong>Stress Mode</strong><span>Quicker pace, warmer tones</span></button>' +
      '</div>' +
      '<div class="nav-row" style="justify-content:center;">' +
        '<button class="btn btn-primary" id="beginBtn">Begin the Journey</button>' +
      '</div>';

    el.querySelectorAll("[data-mode-btn]").forEach(function(btn){
      btn.addEventListener("click", function(){
        state.mode = btn.getAttribute("data-mode-btn");
        document.body.setAttribute("data-mode", state.mode);
        el.querySelectorAll("[data-mode-btn]").forEach(function(b){ b.setAttribute("aria-pressed", String(b===btn)); });
      });
    });
    el.querySelector("#beginBtn").addEventListener("click", function(){
      state.step = 1;
      goToStep();
    });
  }

  /* ---------------------------------------------------------
     SCREEN 1: CHAPTER 1 — SCENARIOS
  --------------------------------------------------------- */
  function renderChapter1(el){
    var idx = state.ch1Index;
    var scenario = SCENARIOS[idx];
    var chosen = state.ch1Answers[idx];

    var optsHtml = scenario.options.map(function(opt, i){
      var sel = chosen === i ? " selected" : "";
      return '<button type="button" class="option'+sel+'" data-opt="'+i+'" aria-pressed="'+(chosen===i)+'">'+opt.label+'</button>';
    }).join("");

    el.innerHTML =
      '<span class="eyebrow">Chapter 1 · Discover Your Thinking Style</span>' +
      '<h2 data-autofocus>Scenario '+(idx+1)+' of '+SCENARIOS.length+'</h2>' +
      '<div class="scenario"><p>'+scenario.text+'</p></div>' +
      '<div class="options" role="group" aria-label="Choose the response closest to how you\'d react">'+optsHtml+'</div>' +
      '<div class="nav-row">' +
        '<button class="btn btn-ghost" id="backBtn" '+(idx===0?'disabled':'')+'>Back</button>' +
        '<button class="btn btn-primary" id="nextBtn" '+(chosen===null?'disabled':'')+'>'+(idx===SCENARIOS.length-1 ? "Continue to Chapter 2" : "Next")+'</button>' +
      '</div>';

    el.querySelectorAll(".option").forEach(function(optBtn){
      optBtn.addEventListener("click", function(){
        var i = parseInt(optBtn.getAttribute("data-opt"),10);
        state.ch1Answers[idx] = i;
        el.querySelectorAll(".option").forEach(function(b,bi){
          b.classList.toggle("selected", bi===i);
          b.setAttribute("aria-pressed", String(bi===i));
        });
        el.querySelector("#nextBtn").disabled = false;
      });
    });

    el.querySelector("#backBtn").addEventListener("click", function(){
      if(idx>0){ state.ch1Index--; renderChapter1(el2Fresh()); } else { state.step=0; goToStep(); }
    });
    el.querySelector("#nextBtn").addEventListener("click", function(){
      if(idx < SCENARIOS.length-1){
        state.ch1Index++;
        setScreen(renderChapter1);
      } else {
        // score chapter 1
        state.ch1Answers.forEach(function(ansIdx, qIdx){
          if(ansIdx!==null) addScore(SCENARIOS[qIdx].options[ansIdx].scores);
        });
        state.step = 2;
        goToStep();
      }
    });

    function el2Fresh(){ setScreen(renderChapter1); return document.createElement("div"); }
  }

  /* ---------------------------------------------------------
     SCREEN 2: CHAPTER 2 — DRAGGABLE PRIORITY RANKING
  --------------------------------------------------------- */
  function renderChapter2(el){
    el.innerHTML =
      '<span class="eyebrow">Chapter 2 · Choose Your Priorities</span>' +
      '<h2 data-autofocus>Rank what matters most to you</h2>' +
      '<p class="rank-instructions">Drag the cards so the statement that feels <strong>most true</strong> for you is at the top, and the least true is at the bottom. On a keyboard, focus a card and use the arrow buttons, or Arrow Up / Arrow Down.</p>' +
      '<ul class="rank-list" id="rankList" aria-label="Drag to reorder your priorities"></ul>' +
      '<div class="nav-row">' +
        '<button class="btn btn-ghost" id="backBtn">Back</button>' +
        '<button class="btn btn-primary" id="nextBtn">Continue to Chapter 3</button>' +
      '</div>';

    var list = el.querySelector("#rankList");
    renderRankItems(list);

    el.querySelector("#backBtn").addEventListener("click", function(){ state.step=1; goToStep(); });
    el.querySelector("#nextBtn").addEventListener("click", function(){
      // scoring: top position = 5 points down to 1 point
      var n = state.ch2Order.length;
      state.ch2Order.forEach(function(cardId, position){
        var card = PRIORITY_CARDS.filter(function(c){ return c.id===cardId; })[0];
        var pts = n - position; // rank 0 (top) => n points
        for(var k in card.weight){
          addScore(makeWeighted(card.weight, pts));
        }
      });
      state.step = 3;
      goToStep();
    });
  }

  function makeWeighted(weightObj, pts){
    var out = {};
    for(var k in weightObj){ out[k] = weightObj[k]*pts; }
    return out;
  }

  function renderRankItems(list){
    list.innerHTML = "";
    state.ch2Order.forEach(function(cardId, i){
      var card = PRIORITY_CARDS.filter(function(c){ return c.id===cardId; })[0];
      var li = document.createElement("li");
      li.className = "rank-item";
      li.setAttribute("draggable","false");
      li.setAttribute("data-id", cardId);
      li.setAttribute("tabindex","0");
      li.setAttribute("role","group");
      li.setAttribute("aria-label", "Priority "+(i+1)+" of "+state.ch2Order.length+": "+card.text);
      li.innerHTML =
        '<span class="rank-handle" aria-hidden="true">&#8942;&#8942;</span>' +
        '<span class="rank-order">'+(i+1)+'</span>' +
        '<span class="rank-text">'+card.text+'</span>' +
        '<span class="rank-move-buttons">' +
          '<button type="button" aria-label="Move up" data-dir="-1" '+(i===0?'disabled':'')+'>&#9650;</button>' +
          '<button type="button" aria-label="Move down" data-dir="1" '+(i===state.ch2Order.length-1?'disabled':'')+'>&#9660;</button>' +
        '</span>';
      list.appendChild(li);

      li.querySelectorAll("[data-dir]").forEach(function(btn){
        btn.addEventListener("click", function(e){
          e.stopPropagation();
          moveRankItem(cardId, parseInt(btn.getAttribute("data-dir"),10));
          renderRankItems(list);
          var again = list.querySelector('[data-id="'+cardId+'"]');
          if(again) again.focus();
        });
      });

      li.addEventListener("keydown", function(e){
        if(e.key==="ArrowUp"){ e.preventDefault(); moveRankItem(cardId,-1); renderRankItems(list); var a=list.querySelector('[data-id="'+cardId+'"]'); if(a) a.focus(); }
        else if(e.key==="ArrowDown"){ e.preventDefault(); moveRankItem(cardId,1); renderRankItems(list); var b=list.querySelector('[data-id="'+cardId+'"]'); if(b) b.focus(); }
      });

      attachPointerDrag(li, list, {
        getOrder: function(){ return state.ch2Order; },
        setOrder: function(newOrder){ state.ch2Order = newOrder; },
        rerender: function(){ renderRankItems(list); }
      });
    });
  }

  function moveRankItem(cardId, dir){
    var arr = state.ch2Order;
    var i = arr.indexOf(cardId);
    var j = i+dir;
    if(j<0 || j>=arr.length) return;
    var tmp = arr[i]; arr[i]=arr[j]; arr[j]=tmp;
  }

  // Generic pointer-based drag-and-drop reordering (mouse + touch unified via Pointer Events)
  function attachPointerDrag(item, listEl, api){
    var pointerId = null;
    var startY = 0;
    var placeholderIndex = -1;

    item.addEventListener("pointerdown", function(e){
      if(e.target.closest("button")) return; // don't drag from buttons
      if(e.button !== undefined && e.button !== 0 && e.pointerType==="mouse") return;
      pointerId = e.pointerId;
      startY = e.clientY;
      item.setPointerCapture(pointerId);
      item.classList.add("dragging");

      function onMove(ev){
        if(ev.pointerId !== pointerId) return;
        var siblings = Array.prototype.slice.call(listEl.children).filter(function(c){ return c!==item; });
        var y = ev.clientY;
        var newIndex = api.getOrder().indexOf(item.getAttribute("data-id"));
        for(var i=0;i<siblings.length;i++){
          var rect = siblings[i].getBoundingClientRect();
          var mid = rect.top + rect.height/2;
          if(y < mid){ newIndex = api.getOrder().indexOf(siblings[i].getAttribute("data-id")); break; }
          else { newIndex = api.getOrder().indexOf(siblings[i].getAttribute("data-id")) + 1; }
        }
        var order = api.getOrder().slice();
        var curId = item.getAttribute("data-id");
        var curIndex = order.indexOf(curId);
        order.splice(curIndex,1);
        if(newIndex>order.length) newIndex = order.length;
        order.splice(newIndex,0,curId);
        if(JSON.stringify(order)!==JSON.stringify(api.getOrder())){
          api.setOrder(order);
          api.rerender();
          var again = listEl.querySelector('[data-id="'+curId+'"]');
          if(again){
            again.classList.add("dragging");
            again.setPointerCapture(pointerId);
            item = again;
          }
        }
      }
      function onUp(ev){
        if(ev.pointerId !== pointerId) return;
        item.classList.remove("dragging");
        window.removeEventListener("pointermove", onMove);
        window.removeEventListener("pointerup", onUp);
        window.removeEventListener("pointercancel", onUp);
        pointerId = null;
      }
      window.addEventListener("pointermove", onMove);
      window.addEventListener("pointerup", onUp);
      window.addEventListener("pointercancel", onUp);
    });
  }

  /* ---------------------------------------------------------
     SCREEN 3: CHAPTER 3 — TIMELINE MAPPING
  --------------------------------------------------------- */
  var kbPickedChip = null;

  function renderChapter3(el){
    var allPlaced = TIMELINE_CHIPS.every(function(c){ return state.ch3Placements[c.id]; });

    el.innerHTML =
      '<span class="eyebrow">Chapter 3 · Map Your Thinking</span>' +
      '<h2 data-autofocus>Place each moment on your timeline</h2>' +
      '<p>Drag each chip to the stage where it feels like it belongs. On a keyboard: press Enter on a chip to pick it up, Tab to a stage, then press Enter to drop it there.</p>' +
      '<div class="timeline-wrap">' +
        '<div class="timeline" id="timelineStages"></div>' +
        '<div class="chip-pool" id="chipPool" aria-label="Unplaced thought chips"></div>' +
      '</div>' +
      '<p class="kb-hint" id="kbHint" aria-live="polite">&nbsp;</p>' +
      '<div class="nav-row">' +
        '<button class="btn btn-ghost" id="backBtn">Back</button>' +
        '<button class="btn btn-primary" id="nextBtn" '+(allPlaced?'':'disabled')+'>See Your Reflection</button>' +
      '</div>';

    var stagesEl = el.querySelector("#timelineStages");
    var poolEl = el.querySelector("#chipPool");

    TIMELINE_STAGES.forEach(function(stage){
      var div = document.createElement("div");
      div.className = "timeline-stage";
      div.setAttribute("data-stage", stage.id);
      div.setAttribute("tabindex","0");
      div.setAttribute("role","group");
      div.setAttribute("aria-label", stage.label+" stage, drop zone");
      div.innerHTML = '<h3>'+stage.label+'</h3><span class="stage-hint">'+stage.hint+'</span>';
      stagesEl.appendChild(div);

      TIMELINE_CHIPS.forEach(function(chip){
        if(state.ch3Placements[chip.id] === stage.id){
          div.appendChild(makeChipEl(chip, true));
        }
      });

      div.addEventListener("dragover", function(e){ e.preventDefault(); div.classList.add("dragover"); });
      div.addEventListener("dragleave", function(){ div.classList.remove("dragover"); });
      div.addEventListener("drop", function(e){
        e.preventDefault();
        div.classList.remove("dragover");
        var chipId = e.dataTransfer.getData("text/plain");
        placeChip(chipId, stage.id);
        renderChapter3(el.parentElement ? el : el); // rerender in place
        rerenderChapter3InPlace(el);
      });

      div.addEventListener("click", function(){
        if(kbPickedChip){
          placeChip(kbPickedChip, stage.id);
          kbPickedChip = null;
          rerenderChapter3InPlace(el);
        }
      });
      div.addEventListener("keydown", function(e){
        if((e.key==="Enter" || e.key===" ") && kbPickedChip){
          e.preventDefault();
          placeChip(kbPickedChip, stage.id);
          kbPickedChip = null;
          rerenderChapter3InPlace(el);
        }
      });
    });

    TIMELINE_CHIPS.forEach(function(chip){
      if(!state.ch3Placements[chip.id]){
        poolEl.appendChild(makeChipEl(chip, false));
      }
    });

    el.querySelector("#backBtn").addEventListener("click", function(){ state.step=2; goToStep(); });
    el.querySelector("#nextBtn").addEventListener("click", function(){
      TIMELINE_CHIPS.forEach(function(chip){
        var placedStage = state.ch3Placements[chip.id];
        if(placedStage === chip.stage){
          addScore(chip.scores);
        }
        // partial credit toward balanced when placed thoughtfully but not exact
      });
      state.step = 4;
      goToStep();
    });

    function makeChipEl(chip, placed){
      var span = document.createElement("div");
      span.className = "chip" + (placed ? " placed" : "");
      span.setAttribute("data-chip", chip.id);
      span.setAttribute("tabindex","0");
      span.setAttribute("draggable", placed ? "false" : "true");
      span.textContent = chip.text;
      span.setAttribute("role","button");
      span.setAttribute("aria-pressed", "false");

      if(!placed){
        span.addEventListener("dragstart", function(e){
          e.dataTransfer.setData("text/plain", chip.id);
          span.classList.add("dragging");
        });
        span.addEventListener("dragend", function(){ span.classList.remove("dragging"); });

        span.addEventListener("pointerdown", function(e){
          // touch fallback: simple pick-then-tap using pointer, complements native DnD on desktop
          if(e.pointerType === "touch"){
            e.preventDefault();
            selectChipForKeyboard(chip.id, span, el);
          }
        });

        span.addEventListener("click", function(){
          selectChipForKeyboard(chip.id, span, el);
        });
        span.addEventListener("keydown", function(e){
          if(e.key==="Enter" || e.key===" "){
            e.preventDefault();
            selectChipForKeyboard(chip.id, span, el);
          }
        });
      }
      return span;
    }
  }

  function selectChipForKeyboard(chipId, span, el){
    if(kbPickedChip === chipId){
      kbPickedChip = null;
      span.classList.remove("picked");
      span.setAttribute("aria-pressed","false");
      setHint(el, "");
      return;
    }
    kbPickedChip = chipId;
    el.querySelectorAll(".chip").forEach(function(c){ c.classList.remove("picked"); c.setAttribute("aria-pressed","false"); });
    span.classList.add("picked");
    span.setAttribute("aria-pressed","true");
    setHint(el, "Chip picked up. Now click or press Enter on a stage to drop it there.");
  }

  function setHint(el, text){
    var hint = el.querySelector("#kbHint");
    if(hint) hint.textContent = text || "\u00A0";
  }

  function placeChip(chipId, stageId){
    state.ch3Placements[chipId] = stageId;
  }

  function rerenderChapter3InPlace(oldEl){
    var fresh = document.createElement("div");
    fresh.className = "screen";
    renderChapter3(fresh);
    oldEl.replaceWith(fresh);
  }

  /* ---------------------------------------------------------
     SCREEN 4: FINAL REFLECTION JOURNAL
  --------------------------------------------------------- */
  function renderFinal(el){
    var total = TENDENCY_KEYS.reduce(function(sum,k){ return sum + Math.max(0,state.scores[k]); }, 0);
    if(total <= 0) total = 1;
    var pct = {};
    TENDENCY_KEYS.forEach(function(k){ pct[k] = Math.round((Math.max(0,state.scores[k])/total)*100); });

    // normalize rounding so it sums to ~100
    var sumPct = TENDENCY_KEYS.reduce(function(s,k){ return s+pct[k]; }, 0);
    var diff = 100 - sumPct;
    if(diff !== 0){
      var topKey = TENDENCY_KEYS.slice().sort(function(a,b){ return pct[b]-pct[a]; })[0];
      pct[topKey] += diff;
    }

    var sortedKeys = TENDENCY_KEYS.slice().sort(function(a,b){ return pct[b]-pct[a]; });
    var topKey = sortedKeys[0];
    var secondKey = sortedKeys[1];

    el.innerHTML =
      '<span class="eyebrow">Final Reflection Journal</span>' +
      '<h2 data-autofocus>Your Thinking Pattern Snapshot</h2>' +
      '<div class="bloom-wrap" id="bloomWrap"></div>' +
      '<div class="breakdown" id="breakdownRows"></div>' +
      '<div class="insight-card">' +
        '<h3>What this suggests</h3>' +
        '<p>Your responses lean most toward <strong>'+TENDENCIES[topKey].name+'</strong>. '+TENDENCIES[topKey].desc+'</p>' +
        '<p>There\'s also a meaningful thread of <strong>'+TENDENCIES[secondKey].name+'</strong> in how you approach things — '+lowerFirst(TENDENCIES[secondKey].desc)+'</p>' +
        '<p>Remember: this is a reflection of the choices you made today, in this mood, not a fixed label. These patterns shift with context, rest, and practice.</p>' +
      '</div>' +
      '<label for="journalBox" style="display:block; font-weight:600; margin-bottom:8px;">A few words for your future self (optional, saved on this device only)</label>' +
      '<textarea class="journal-input" id="journalBox" placeholder="What did you notice about how you think or decide?"></textarea>' +
      '<div class="restart-row">' +
        '<button class="btn btn-ghost" id="backBtn">Back</button>' +
        ' &nbsp; ' +
        '<button class="btn btn-primary" id="restartBtn">Begin a New Journey</button>' +
      '</div>';

    var box = el.querySelector("#journalBox");
    try{
      var saved = localStorage.getItem("cpe_journal");
      if(saved) box.value = saved;
    }catch(e){ /* localStorage unavailable, ignore */ }
    box.addEventListener("input", function(){
      state.journalText = box.value;
      try{ localStorage.setItem("cpe_journal", box.value); }catch(e){}
    });

    renderBreakdown(el.querySelector("#breakdownRows"), pct, sortedKeys);
    renderBloom(el.querySelector("#bloomWrap"), pct);

    el.querySelector("#backBtn").addEventListener("click", function(){ state.step=3; goToStep(); });
    el.querySelector("#restartBtn").addEventListener("click", function(){
      resetJourney();
    });
  }

  function lowerFirst(str){ return str.charAt(0).toLowerCase()+str.slice(1); }

  function renderBreakdown(container, pct, sortedKeys){
    container.innerHTML = "";
    sortedKeys.forEach(function(key){
      var row = document.createElement("div");
      row.className = "breakdown-row";
      row.innerHTML =
        '<span class="breakdown-label">'+TENDENCIES[key].name+'</span>' +
        '<span class="breakdown-bar"><i style="width:0%"></i></span>' +
        '<span class="breakdown-pct">'+pct[key]+'%</span>';
      container.appendChild(row);
      requestAnimationFrame(function(){
        row.querySelector("i").style.width = pct[key]+"%";
      });
    });
  }

  // Signature visual: a radial "bloom" chart — five petals whose length reflects each tendency's share.
  function renderBloom(container, pct){
    var size = 260;
    var cx = size/2, cy = size/2;
    var maxR = 100;
    var keys = TENDENCY_KEYS;
    var colors = { analytical:"#7FA88F", emotional:"#D9A886", overthink:"#B98BA3", action:"#8BA6C9", balanced:"#C6B26A" };
    var n = keys.length;
    var petals = "";
    keys.forEach(function(key, i){
      var angle = (Math.PI*2/n)*i - Math.PI/2;
      var r = 22 + (pct[key]/100)*maxR;
      var x = cx + Math.cos(angle)*r;
      var y = cy + Math.sin(angle)*r;
      var ctrlAngle1 = angle - 0.35;
      var ctrlAngle2 = angle + 0.35;
      var cr = r*0.55;
      var cx1 = cx + Math.cos(ctrlAngle1)*cr;
      var cy1 = cy + Math.sin(ctrlAngle1)*cr;
      var cx2 = cx + Math.cos(ctrlAngle2)*cr;
      var cy2 = cy + Math.sin(ctrlAngle2)*cr;
      petals += '<path d="M '+cx+' '+cy+' Q '+cx1+' '+cy1+' '+x+' '+y+' Q '+cx2+' '+cy2+' '+cx+' '+cy+' Z" fill="'+colors[key]+'" opacity="0.82" />';
    });
    container.innerHTML =
      '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" role="img" aria-label="A bloom-shaped chart with five petals representing the percentage share of each thinking tendency">' +
        '<circle cx="'+cx+'" cy="'+cy+'" r="'+maxR+22+'" fill="none" stroke="var(--line)" stroke-width="1"></circle>' +
        petals +
        '<circle cx="'+cx+'" cy="'+cy+'" r="16" fill="var(--card)" stroke="var(--sage-deep)" stroke-width="2"></circle>' +
      '</svg>';
  }

  /* ---------------------------------------------------------
     NAVIGATION
  --------------------------------------------------------- */
  function goToStep(){
    if(state.step===0) setScreen(renderStart);
    else if(state.step===1) setScreen(renderChapter1);
    else if(state.step===2) setScreen(renderChapter2);
    else if(state.step===3) setScreen(renderChapter3);
    else if(state.step===4) setScreen(renderFinal);
  }

  function resetJourney(){
    state.step = 0;
    state.scores = { analytical:0, emotional:0, overthink:0, action:0, balanced:0 };
    state.ch1Answers = new Array(SCENARIOS.length).fill(null);
    state.ch1Index = 0;
    state.ch2Order = PRIORITY_CARDS.map(function(c){ return c.id; });
    state.ch3Placements = {};
    kbPickedChip = null;
    goToStep();
  }

  /* ---------------------------------------------------------
     INIT
  --------------------------------------------------------- */
  document.body.setAttribute("data-mode", state.mode);
  buildAmbient();
  goToStep();

})();
</script>
</body>
