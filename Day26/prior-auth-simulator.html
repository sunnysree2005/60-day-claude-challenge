<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prior Authorization Workflow Simulator</title>
<style>
  /* ===================== ROOT / THEME ===================== */
  :root{
    --blue-950:#071a33;
    --blue-900:#0b2545;
    --blue-800:#123a6b;
    --blue-700:#17508f;
    --blue-600:#1c6bb8;
    --blue-500:#2e86de;
    --blue-400:#5fa8ef;
    --blue-300:#9ac9f5;
    --blue-200:#cfe6fb;
    --blue-100:#e9f4fd;
    --blue-050:#f4faff;
    --white:#ffffff;
    --black:#0a0a0a;
    --patient:#1c6bb8;
    --provider:#2e86de;
    --payer:#0b2545;
    --good:#1f9d55;
    --warn:#c98a12;
    --bad:#c0392b;
    --radius:14px;
    --shadow:0 6px 18px rgba(11,37,69,0.18);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:'Segoe UI', Roboto, Arial, sans-serif;
    background:linear-gradient(160deg,var(--blue-050),var(--blue-100) 40%, var(--blue-200));
    color:var(--black);
  }
  h1,h2,h3,h4{color:var(--black); margin:0 0 8px 0;}
  button{
    font-family:inherit; cursor:pointer; border:none; border-radius:10px;
    padding:10px 16px; font-weight:600; font-size:14px;
    background:var(--blue-600); color:var(--white);
    transition:transform .12s ease, background .2s ease, box-shadow .2s ease;
    box-shadow:0 3px 8px rgba(11,37,69,0.25);
  }
  button:hover{background:var(--blue-700); transform:translateY(-1px);}
  button:active{transform:translateY(0);}
  button:disabled{background:#9fb7cc; cursor:not-allowed; box-shadow:none; transform:none;}
  button.secondary{background:var(--white); color:var(--blue-700); border:2px solid var(--blue-500);}
  button.secondary:hover{background:var(--blue-100);}
  button.danger{background:var(--bad);}
  button.danger:hover{background:#a53125;}

  /* ===================== APP SHELL ===================== */
  #app{max-width:1200px; margin:0 auto; padding:18px 18px 60px 18px;}

  header.top-bar{
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:12px; margin-bottom:14px;
  }
  header.top-bar .title-block h1{font-size:22px;}
  header.top-bar .title-block p{margin:0; font-size:13px; color:var(--blue-800);}
  .stats-row{display:flex; gap:10px; flex-wrap:wrap;}
  .stat-pill{
    background:var(--white); border:2px solid var(--blue-300); border-radius:999px;
    padding:8px 16px; font-size:13px; font-weight:700; color:var(--blue-900);
    box-shadow:var(--shadow); display:flex; align-items:center; gap:6px;
  }
  .stat-pill span.val{color:var(--blue-600); font-size:15px;}

  /* ===================== PROGRESS TRACKER ===================== */
  #progressTracker{
    display:flex; overflow-x:auto; gap:4px; padding:12px 10px; margin-bottom:16px;
    background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow);
    border:1px solid var(--blue-200);
  }
  .tracker-step{
    flex:0 0 auto; min-width:96px; text-align:center; font-size:11px; color:var(--blue-800);
    position:relative; padding:6px 4px;
  }
  .tracker-step .dot{
    width:20px; height:20px; border-radius:50%; background:var(--blue-200);
    border:2px solid var(--blue-400); margin:0 auto 4px auto;
    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--blue-800);
  }
  .tracker-step.done .dot{background:var(--good); border-color:var(--good); color:white;}
  .tracker-step.active .dot{background:var(--blue-600); border-color:var(--blue-600); color:white; box-shadow:0 0 0 4px rgba(46,134,222,0.25);}
  .tracker-step.bad .dot{background:var(--bad); border-color:var(--bad); color:white;}
  .tracker-step:not(:last-child)::after{
    content:''; position:absolute; top:16px; left:60%; width:80%; height:2px; background:var(--blue-200); z-index:-1;
  }
  .tracker-step.done:not(:last-child)::after{background:var(--good);}

  /* ===================== SCENARIO PICKER ===================== */
  #scenarioPicker{
    background:var(--white); border-radius:var(--radius); padding:26px; box-shadow:var(--shadow);
    border:1px solid var(--blue-200);
  }
  .scenario-grid{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:16px; margin-top:16px;
  }
  .scenario-card{
    background:var(--blue-050); border:2px solid var(--blue-200); border-radius:var(--radius);
    padding:16px; cursor:pointer; transition:all .18s ease; text-align:left;
  }
  .scenario-card:hover{border-color:var(--blue-500); transform:translateY(-3px); box-shadow:var(--shadow);}
  .scenario-card .emoji{font-size:34px;}
  .scenario-card h3{font-size:16px; margin:8px 0 4px 0; color:var(--blue-900);}
  .scenario-card p{font-size:12.5px; color:var(--blue-800); line-height:1.4;}
  .scenario-card .tag{
    display:inline-block; margin-top:8px; font-size:10.5px; font-weight:700; color:var(--white);
    background:var(--blue-600); padding:3px 8px; border-radius:999px;
  }

  /* ===================== BOARD (LANES) ===================== */
  #board{
    display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:18px;
  }
  .lane{
    background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow);
    border-top:6px solid var(--blue-500); padding:12px; min-height:220px;
  }
  .lane.lane-patient{border-top-color:var(--patient);}
  .lane.lane-provider{border-top-color:var(--provider);}
  .lane.lane-payer{border-top-color:var(--payer);}
  .lane h2{font-size:15px; display:flex; align-items:center; gap:8px;}
  .lane h2 .lane-icon{
    width:26px; height:26px; border-radius:8px; display:flex; align-items:center; justify-content:center;
    color:white; font-size:14px; background:var(--blue-500);
  }
  .lane-patient h2 .lane-icon{background:var(--patient);}
  .lane-provider h2 .lane-icon{background:var(--provider);}
  .lane-payer h2 .lane-icon{background:var(--payer);}

  .lane-slots{display:flex; flex-direction:column; gap:10px; margin-top:10px;}

  .slot{
    border:2px dashed var(--blue-200); border-radius:10px; padding:10px; min-height:56px;
    font-size:12.5px; color:var(--blue-800); position:relative; transition:all .15s ease;
    background:var(--blue-050);
  }
  .slot.done{border-style:solid; border-color:var(--good); background:#eafaf0;}
  .slot.dragover{border-color:var(--blue-600); background:var(--blue-200); box-shadow:0 0 0 3px rgba(46,134,222,0.25);}
  .slot.invalid-flash{animation:shake .35s ease;}
  .slot .slot-title{font-weight:700; color:var(--blue-900); font-size:13px; margin-bottom:2px;}
  .slot .slot-sub{font-size:11px;}
  .slot .badge-done{
    position:absolute; top:6px; right:8px; background:var(--good); color:white; font-size:10px;
    padding:2px 7px; border-radius:999px; font-weight:700;
  }
  .slot.outcome-good{border-color:var(--good);}
  .slot.outcome-warn{border-color:var(--warn);}
  .slot.outcome-bad{border-color:var(--bad);}

  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-6px);}
    40%{transform:translateX(6px);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(4px);}
  }

  /* ===================== CASE TOKEN (draggable card) ===================== */
  #caseToken{
    display:inline-flex; align-items:center; gap:8px; background:var(--blue-600); color:white;
    padding:8px 14px; border-radius:10px; font-size:12.5px; font-weight:700; cursor:grab;
    box-shadow:0 4px 10px rgba(11,37,69,0.3); user-select:none;
  }
  #caseToken:active{cursor:grabbing;}
  #caseToken .pulse{
    width:10px; height:10px; border-radius:50%; background:#fff; animation:pulse 1.2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,255,255,0.6);}
    70%{box-shadow:0 0 0 8px rgba(255,255,255,0);}
    100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}
  }
  .token-holder{min-height:44px; display:flex; align-items:center; justify-content:center; padding-top:4px;}

  /* ===================== CHECKLISTS ===================== */
  .checklist{margin-top:6px; display:flex; flex-direction:column; gap:5px;}
  .checklist label{
    display:flex; align-items:center; gap:6px; font-size:11.5px; background:var(--white);
    border:1px solid var(--blue-200); border-radius:7px; padding:5px 8px; cursor:pointer;
  }
  .checklist label:hover{background:var(--blue-100);}
  .checklist input{accent-color:var(--blue-600);}

  /* ===================== ACTION PANEL ===================== */
  #actionPanel{
    background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px;
    border:1px solid var(--blue-200); margin-bottom:16px;
  }
  #actionPanel h3{font-size:15px; color:var(--blue-900);}
  #actionPanel .hint{font-size:12.5px; color:var(--blue-800); margin-bottom:10px;}
  #actionPanel .btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:8px;}

  /* ===================== EDUCATION PANEL ===================== */
  #eduPanel{
    background:var(--blue-900); color:var(--blue-050); border-radius:var(--radius);
    padding:16px 18px; margin-bottom:16px; box-shadow:var(--shadow); display:none;
  }
  #eduPanel.show{display:block; animation:fadeIn .3s ease;}
  #eduPanel h4{color:#dff0ff; font-size:13px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px;}
  #eduPanel p{font-size:13.5px; line-height:1.55; color:#eaf4ff; margin:0;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);}}

  /* ===================== SUMMARY ===================== */
  #summaryScreen{
    background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); padding:26px;
    border:1px solid var(--blue-200); text-align:center;
  }
  #summaryScreen h2{font-size:22px;}
  .summary-grid{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin:18px 0;
  }
  .summary-stat{
    background:var(--blue-050); border:2px solid var(--blue-200); border-radius:12px; padding:14px;
  }
  .summary-stat .num{font-size:24px; font-weight:800; color:var(--blue-700);}
  .summary-stat .lbl{font-size:12px; color:var(--blue-800); font-weight:600;}
  #summaryLog{text-align:left; max-width:640px; margin:0 auto; font-size:12.5px; color:var(--blue-900);}
  #summaryLog li{margin-bottom:5px; line-height:1.4;}

  /* ===================== CONFETTI ===================== */
  #confettiLayer{
    position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:9999;
  }
  .confetti-piece{
    position:absolute; top:-20px; width:10px; height:16px; opacity:0.9;
    animation:fall linear forwards;
  }
  @keyframes fall{
    to{transform:translateY(110vh) rotate(720deg); opacity:0.3;}
  }

  footer.app-footer{
    text-align:center; font-size:11.5px; color:var(--blue-700); margin-top:26px;
  }

  @media (max-width:820px){
    #board{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div id="confettiLayer"></div>

<div id="app">
  <header class="top-bar">
    <div class="title-block">
      <h1>🏥 Prior Authorization Workflow Simulator</h1>
      <p>Drag the case through Patient → Provider → Payer to learn how real PA requests move.</p>
    </div>
    <div class="stats-row" id="statsRow"><!-- populated by JS --></div>
  </header>

  <div id="progressTracker"></div>

  <!-- Scenario picker (shown at start / restart) -->
  <div id="scenarioPicker"></div>

  <!-- Main workflow board (hidden until a scenario is chosen) -->
  <div id="workflowWrap" style="display:none;">
    <div id="eduPanel"></div>
    <div id="actionPanel"></div>
    <div id="board"></div>
  </div>

  <!-- Summary screen -->
  <div id="summaryScreen" style="display:none;"></div>

  <footer class="app-footer">Educational simulation only — not affiliated with any real payer or provider. All data is fictional and stored in-memory only.</footer>
</div>

<script>
/* =====================================================================
   PRIOR AUTHORIZATION WORKFLOW SIMULATOR
   Pure vanilla JS. All state lives in memory (no localStorage).
   ===================================================================== */

/* ---------------------------------------------------------------------
   1. SCENARIO DATA  (easy to edit / extend)
   --------------------------------------------------------------------- */
const SCENARIOS = [
  {
    id: 'elective_surgery',
    name: 'Elective Knee Surgery',
    emoji: '🦵',
    category: 'Elective Surgery',
    description: 'A 54-year-old patient with chronic knee pain needs an elective arthroscopic surgery.',
    necessityCriteria: [
      'Documented conservative treatment (PT/meds) for 6+ weeks with insufficient relief',
      'Imaging (X-ray/MRI) confirms structural damage',
      'Functional limitation impacting daily activities'
    ],
    requiredDocs: [
      'Physician order / surgical plan',
      'Clinical notes showing failed conservative care',
      'Relevant imaging report',
      'Patient insurance & demographic form'
    ],
    baseApprovalChance: 0.6
  },
  {
    id: 'mri_scan',
    name: 'Lumbar Spine MRI',
    emoji: '🧲',
    category: 'MRI',
    description: 'A 39-year-old with persistent lower back pain and radiculopathy needs an MRI to rule out disc herniation.',
    necessityCriteria: [
      'Red-flag symptoms or radiculopathy documented',
      'Conservative therapy attempted (4+ weeks) without resolution',
      'Neurological exam findings recorded'
    ],
    requiredDocs: [
      'Physician order for MRI',
      'Progress notes documenting symptom duration',
      'Prior conservative treatment record',
      'Insurance eligibility verification'
    ],
    baseApprovalChance: 0.65
  },
  {
    id: 'specialty_med',
    name: 'Specialty Autoimmune Medication',
    emoji: '💊',
    category: 'Specialty Medication',
    description: 'A patient with rheumatoid arthritis needs a biologic specialty drug after failing first-line therapy.',
    necessityCriteria: [
      'Diagnosis confirmed with lab/clinical criteria',
      'Documented failure or intolerance of preferred first-line drug(s)',
      'Prescriber attestation of medical necessity'
    ],
    requiredDocs: [
      'Diagnosis & lab results',
      'Medication trial/failure history',
      'Specialty pharmacy intake form',
      'Prescriber letter of medical necessity'
    ],
    baseApprovalChance: 0.5
  },
  {
    id: 'inpatient_admission',
    name: 'Inpatient Hospital Admission',
    emoji: '🏨',
    category: 'Inpatient Admission',
    description: 'A patient presenting with severe pneumonia requires inpatient admission for IV antibiotics and monitoring.',
    necessityCriteria: [
      'Vital signs / severity criteria meet inpatient level of care',
      'Risk factors (comorbidities, age) documented',
      'Failed or inappropriate for outpatient management'
    ],
    requiredDocs: [
      'Admitting physician notes',
      'Vitals & severity scoring (e.g., CURB-65)',
      'Relevant labs/imaging',
      'Utilization review (InterQual/MCG) checklist'
    ],
    baseApprovalChance: 0.55
  }
];

/* ---------------------------------------------------------------------
   2. STATE
   --------------------------------------------------------------------- */
let state = null; // reset in newGame()

function freshState(scenario){
  return {
    scenario: scenario,
    days: 0,
    efficiency: 100,
    path: [],          // ordered list of completed/active step objects for tracker
    currentStepId: null,
    docsChecked: {},   // required doc -> bool
    criteriaChecked: {}, // necessity criteria -> bool
    pendCount: 0,
    appealed: false,
    finalOutcome: null, // 'approved' | 'denied'
    logForSummary: []
  };
}

/* ---------------------------------------------------------------------
   3. STEP DEFINITIONS
   Each step: id, lane ('patient'|'provider'|'payer'), title, sub,
   type: 'drag' (player drags token here) or 'auto' (system decides),
   education(scenario,state) -> string,
   dayCost: [min,max]
   --------------------------------------------------------------------- */
const STEPS = {
  patient_need: {
    lane:'patient', title:'Care Need Identified', sub:'Patient recognizes symptoms',
    type:'drag', dayCost:[0,1],
    education:(sc)=>`The patient experiences symptoms related to "${sc.description}" This is the starting point of every prior authorization journey — it always begins with a patient's health need, not paperwork.`
  },
  patient_request: {
    lane:'patient', title:'Requests Care', sub:'Patient contacts / visits provider',
    type:'drag', dayCost:[0,2],
    education:(sc)=>`The patient schedules a visit or contacts their provider's office. In real workflows, delays here (getting an appointment) already add to total wait time before PA even starts.`
  },
  provider_necessity: {
    lane:'provider', title:'Medical Necessity Evaluation', sub:'Provider checks payer criteria',
    type:'drag', dayCost:[1,2],
    education:(sc)=>`The provider evaluates whether the requested service meets the payer's medical necessity criteria (often based on guidelines like InterQual or MCG). This step determines whether a PA request is even worth submitting, and shapes what documentation will be needed.`
  },
  provider_docs: {
    lane:'provider', title:'Collect PA Documentation', sub:'Gather required records',
    type:'drag', dayCost:[1,3],
    education:(sc)=>`Staff gather the exact documentation the payer requires — clinical notes, imaging, lab results, or letters of medical necessity. Missing or incomplete documentation is one of the top real-world causes of delays and denials.`
  },
  provider_submit: {
    lane:'provider', title:'Submit PA Request', sub:'Sent to payer (portal/fax/EDI)',
    type:'drag', dayCost:[0,1],
    education:(sc)=>`The completed PA request is submitted to the payer — commonly via a payer portal, secure fax, or an electronic (X12 278) transaction. The clock now starts on the payer's regulatory response timeframe.`
  },
  payer_review: {
    lane:'payer', title:'Payer Utilization Review', sub:'Nurse/medical director reviews',
    type:'auto', dayCost:[2,5],
    education:(sc)=>`A utilization review nurse (and sometimes a medical director) reviews the request against clinical guidelines. Standard requests often take several business days; urgent requests are expedited under regulations in many states.`
  },
  payer_approved: {
    lane:'payer', title:'✅ Approved', sub:'Authorization granted', outcome:'good',
    type:'auto', dayCost:[0,0],
    education:(sc)=>`The payer determined the request met medical necessity criteria and documentation was sufficient. The patient can now proceed with care under this authorization.`
  },
  payer_pend: {
    lane:'payer', title:'⏸ Pended — Info Requested', sub:'Additional documentation needed', outcome:'warn',
    type:'auto', dayCost:[0,0],
    education:(sc)=>`The payer could not make a decision with the information provided and is requesting additional documentation. This is common and NOT a denial — but it does add days to the process.`
  },
  payer_denied: {
    lane:'payer', title:'❌ Denied', sub:'Criteria not met', outcome:'bad',
    type:'auto', dayCost:[0,0],
    education:(sc)=>`The payer determined that medical necessity criteria were not met based on the submitted documentation. Providers and patients have the right to appeal this decision.`
  },
  provider_addl_docs: {
    lane:'provider', title:'Submit Additional Info', sub:'Respond to pend request',
    type:'drag', dayCost:[1,3],
    education:(sc)=>`The provider's office gathers and submits the specific additional information the payer requested (e.g., more recent clinical notes or test results).`
  },
  provider_resubmit: {
    lane:'provider', title:'Resubmit to Payer', sub:'Updated packet sent',
    type:'drag', dayCost:[0,1],
    education:(sc)=>`The completed packet is resubmitted for a second review. Each round trip like this adds real days to a patient's wait for care.`
  },
  payer_review2: {
    lane:'payer', title:'Second Review', sub:'Payer reassesses with new info',
    type:'auto', dayCost:[2,4],
    education:(sc)=>`With the additional documentation in hand, the payer performs a second utilization review to reach a final determination.`
  },
  provider_appeal: {
    lane:'provider', title:'File Appeal', sub:'Formal appeal submitted',
    type:'drag', dayCost:[2,5],
    education:(sc)=>`The provider (often with the patient's consent) files a formal appeal, submitting a written rationale and any new clinical evidence disputing the denial.`
  },
  provider_p2p: {
    lane:'provider', title:'Peer-to-Peer Review', sub:'MD ↔ Medical Director call',
    type:'drag', dayCost:[1,3],
    education:(sc)=>`The treating provider requests a peer-to-peer conversation — a direct phone discussion between the treating physician and the payer's medical director to clarify clinical rationale. This often resolves disputes faster than a written appeal alone.`
  },
  payer_review_final: {
    lane:'payer', title:'Final Determination', sub:'Appeal / P2P outcome decided',
    type:'auto', dayCost:[2,6],
    education:(sc)=>`Following the appeal and/or peer-to-peer discussion, the payer issues a final determination. In many jurisdictions, if this is upheld as a denial, the patient may still pursue an external independent review.`
  }
};

/* ---------------------------------------------------------------------
   4. DOM REFERENCES
   --------------------------------------------------------------------- */
const el = {
  statsRow: document.getElementById('statsRow'),
  tracker: document.getElementById('progressTracker'),
  picker: document.getElementById('scenarioPicker'),
  workflowWrap: document.getElementById('workflowWrap'),
  board: document.getElementById('board'),
  eduPanel: document.getElementById('eduPanel'),
  actionPanel: document.getElementById('actionPanel'),
  summary: document.getElementById('summaryScreen'),
  confetti: document.getElementById('confettiLayer')
};

/* ---------------------------------------------------------------------
   5. INITIALIZATION / SCENARIO PICKER
   --------------------------------------------------------------------- */
function renderScenarioPicker(){
  el.workflowWrap.style.display = 'none';
  el.summary.style.display = 'none';
  el.picker.style.display = 'block';
  el.tracker.innerHTML = '';
  renderStats();

  let html = `<h2>Choose a Patient Scenario</h2>
    <p style="font-size:13px;color:var(--blue-800);">Pick a case to simulate its journey through the prior authorization process.</p>
    <div class="scenario-grid">`;
  SCENARIOS.forEach(sc=>{
    html += `
      <div class="scenario-card" data-id="${sc.id}">
        <div class="emoji">${sc.emoji}</div>
        <h3>${sc.name}</h3>
        <p>${sc.description}</p>
        <span class="tag">${sc.category}</span>
      </div>`;
  });
  html += `</div>`;
  el.picker.innerHTML = html;

  el.picker.querySelectorAll('.scenario-card').forEach(card=>{
    card.addEventListener('click', ()=>{
      const sc = SCENARIOS.find(s=>s.id===card.dataset.id);
      newGame(sc);
    });
  });
}

function newGame(scenario){
  state = freshState(scenario);
  el.picker.style.display = 'none';
  el.summary.style.display = 'none';
  el.workflowWrap.style.display = 'block';
  // seed the workflow with the first step
  pushStep('patient_need');
  renderAll();
}

/* ---------------------------------------------------------------------
   6. STATS + TRACKER
   --------------------------------------------------------------------- */
function renderStats(){
  const days = state ? state.days : 0;
  const eff = state ? Math.max(0, Math.round(state.efficiency)) : 100;
  el.statsRow.innerHTML = `
    <div class="stat-pill">📅 Days Elapsed <span class="val">${days}</span></div>
    <div class="stat-pill">⚡ Efficiency Score <span class="val">${eff}</span></div>
    ${state ? `<div class="stat-pill">🧾 Case <span class="val">${state.scenario.emoji} ${state.scenario.name}</span></div>` : ''}
  `;
}

// Ordered "master" tracker labels — the tracker shows the path actually taken
function renderTracker(){
  if(!state){ el.tracker.innerHTML=''; return; }
  el.tracker.innerHTML = state.path.map((s,idx)=>{
    const def = STEPS[s.id];
    let cls = 'tracker-step';
    if(s.status === 'done') cls += ' done';
    if(s.status === 'active') cls += ' active';
    if(def.outcome === 'bad') cls += ' bad';
    const num = idx+1;
    return `<div class="${cls}"><div class="dot">${s.status==='done' ? '✓' : num}</div>${def.title}</div>`;
  }).join('');
}

/* ---------------------------------------------------------------------
   7. PATH / STEP MANAGEMENT
   --------------------------------------------------------------------- */
function pushStep(stepId){
  // mark previous active step as done
  state.path.forEach(s=>{ if(s.status==='active') s.status='done'; });
  state.path.push({id: stepId, status:'active'});
  state.currentStepId = stepId;
}

function addDays(range){
  const [min,max] = range;
  const d = min + Math.floor(Math.random()*(max-min+1));
  state.days += d;
  return d;
}

function logSummary(text){
  state.logForSummary.push(text);
}

/* ---------------------------------------------------------------------
   8. RENDER BOARD (3 lanes) — shows completed steps + current draggable/auto step
   --------------------------------------------------------------------- */
function renderBoard(){
  const lanes = {patient:[], provider:[], payer:[]};
  state.path.forEach(s=>{
    const def = STEPS[s.id];
    lanes[def.lane].push({...s, def});
  });

  function laneIcon(l){
    return l==='patient' ? '🧑' : l==='provider' ? '🩺' : '🏢';
  }

  let html = '';
  ['patient','provider','payer'].forEach(laneKey=>{
    html += `<div class="lane lane-${laneKey}">
      <h2><span class="lane-icon">${laneIcon(laneKey)}</span>${laneKey.charAt(0).toUpperCase()+laneKey.slice(1)} Lane</h2>
      <div class="lane-slots">`;
    lanes[laneKey].forEach(s=>{
      const isActive = s.status==='active';
      const isDone = s.status==='done';
      let cls = 'slot';
      if(isDone) cls += ' done';
      if(s.def.outcome==='good') cls += ' outcome-good';
      if(s.def.outcome==='warn') cls += ' outcome-warn';
      if(s.def.outcome==='bad') cls += ' outcome-bad';
      html += `<div class="${cls}" data-step="${s.id}" id="slot-${s.id}">
        ${isDone ? `<span class="badge-done">DONE</span>` : ''}
        <div class="slot-title">${s.def.title}</div>
        <div class="slot-sub">${s.def.sub}</div>
        ${isActive ? `<div class="token-holder" id="tokenHolder"></div>` : ''}
      </div>`;
    });
    html += `</div></div>`;
  });
  el.board.innerHTML = html;

  // place the draggable token in the active slot's token holder if this is a 'drag' type step waiting for the NEXT drop target — actually token lives in the action panel drop area (see renderActionPanel)
}

/* ---------------------------------------------------------------------
   9. ACTION PANEL — where the interactive work happens for the CURRENT step
   --------------------------------------------------------------------- */
function renderActionPanel(){
  const stepId = state.currentStepId;
  const def = STEPS[stepId];
  const sc = state.scenario;

  let inner = `<h3>${def.title}</h3><p class="hint">${lanePhrase(def.lane)}</p>`;

  if(stepId === 'provider_necessity'){
    inner += `<p class="hint">Confirm the medical necessity criteria this case meets, then drag the case forward.</p>
      <div class="checklist">` +
      sc.necessityCriteria.map((c,i)=>`
        <label><input type="checkbox" data-crit="${i}" ${state.criteriaChecked[i]?'checked':''}> ${c}</label>
      `).join('') + `</div>`;
  }

  if(stepId === 'provider_docs' || stepId === 'provider_addl_docs'){
    inner += `<p class="hint">Check off each document as it's collected, then drag the case forward.</p>
      <div class="checklist">` +
      sc.requiredDocs.map((d,i)=>`
        <label><input type="checkbox" data-doc="${i}" ${state.docsChecked[i]?'checked':''}> ${d}</label>
      `).join('') + `</div>`;
  }

  if(def.type === 'drag'){
    const readyMsg = isStepReady(stepId) ? '' : `<p class="hint" style="color:var(--warn);font-weight:700;">Complete the checklist above before advancing.</p>`;
    inner += readyMsg + `
      <div class="btn-row">
        <div id="caseToken" draggable="${isStepReady(stepId)}" style="${isStepReady(stepId)?'':'opacity:0.45;cursor:not-allowed;'}">
          <span class="pulse"></span> Drag Case Forward
        </div>
      </div>`;
  } else {
    // auto step (payer decision)
    inner += `<p class="hint">The payer is about to process this. Click below to run the review.</p>
      <div class="btn-row"><button id="runReviewBtn">▶ Run Payer Review</button></div>`;
  }

  el.actionPanel.innerHTML = inner;

  // checklist listeners
  el.actionPanel.querySelectorAll('input[data-crit]').forEach(inp=>{
    inp.addEventListener('change', e=>{
      state.criteriaChecked[e.target.dataset.crit] = e.target.checked;
      renderActionPanel();
    });
  });
  el.actionPanel.querySelectorAll('input[data-doc]').forEach(inp=>{
    inp.addEventListener('change', e=>{
      state.docsChecked[e.target.dataset.doc] = e.target.checked;
      renderActionPanel();
    });
  });

  // drag token
  const token = document.getElementById('caseToken');
  if(token && isStepReady(stepId)){
    token.addEventListener('dragstart', e=>{
      e.dataTransfer.setData('text/plain', stepId);
    });
    // click-to-advance fallback for touch/accessibility
    token.addEventListener('click', ()=>{
      advanceFromDrag(stepId);
    });
  }

  // run review button
  const runBtn = document.getElementById('runReviewBtn');
  if(runBtn){
    runBtn.addEventListener('click', ()=> runPayerDecision(stepId));
  }
}

function lanePhrase(lane){
  if(lane==='patient') return 'Patient-side action.';
  if(lane==='provider') return "Provider's office action.";
  return "Payer's decision point.";
}

function isStepReady(stepId){
  const sc = state.scenario;
  if(stepId === 'provider_necessity'){
    return sc.necessityCriteria.every((c,i)=> state.criteriaChecked[i]);
  }
  if(stepId === 'provider_docs' || stepId === 'provider_addl_docs'){
    return sc.requiredDocs.every((d,i)=> state.docsChecked[i]);
  }
  return true;
}

/* ---------------------------------------------------------------------
   10. DRAG & DROP WIRING onto the NEXT slot(s)
   Since the board only shows completed + current step, the "drop target"
   is a floating ghost slot appended live at the end of the current lane
   representing the immediate next step. We render it, and wire dragover/drop.
   --------------------------------------------------------------------- */
function getNextStepId(currentId){
  const map = {
    patient_need: 'patient_request',
    patient_request: 'provider_necessity',
    provider_necessity: 'provider_docs',
    provider_docs: 'provider_submit',
    provider_submit: 'payer_review',
    provider_addl_docs: 'provider_resubmit',
    provider_resubmit: 'payer_review2',
    provider_appeal: 'provider_p2p',
    provider_p2p: 'payer_review_final'
  };
  return map[currentId] || null;
}

function renderGhostTarget(){
  // Only relevant for 'drag' type steps: show the upcoming slot as a drop zone
  const stepId = state.currentStepId;
  const def = STEPS[stepId];
  if(def.type !== 'drag') return;
  const nextId = getNextStepId(stepId);
  if(!nextId) return;
  const nextDef = STEPS[nextId];

  const laneDiv = [...el.board.querySelectorAll('.lane')].find(l=>l.classList.contains('lane-'+nextDef.lane));
  if(!laneDiv) return;
  const slotsWrap = laneDiv.querySelector('.lane-slots');
  const ghost = document.createElement('div');
  ghost.className = 'slot';
  ghost.id = 'ghost-target';
  ghost.dataset.step = nextId;
  ghost.innerHTML = `<div class="slot-title">${nextDef.title}</div><div class="slot-sub">${nextDef.sub} — drop case here</div>`;
  slotsWrap.appendChild(ghost);

  ghost.addEventListener('dragover', e=>{ e.preventDefault(); ghost.classList.add('dragover'); });
  ghost.addEventListener('dragleave', ()=> ghost.classList.remove('dragover'));
  ghost.addEventListener('drop', e=>{
    e.preventDefault();
    ghost.classList.remove('dragover');
    const draggedId = e.dataTransfer.getData('text/plain');
    if(draggedId === stepId && isStepReady(stepId)){
      advanceFromDrag(stepId);
    } else {
      ghost.classList.add('invalid-flash');
      setTimeout(()=>ghost.classList.remove('invalid-flash'), 400);
    }
  });
}

function advanceFromDrag(stepId){
  const def = STEPS[stepId];
  const d = addDays(def.dayCost);
  logSummary(`${def.title} completed (+${d} day${d===1?'':'s'}).`);
  const nextId = getNextStepId(stepId);
  showEducation(def);
  pushStep(nextId);
  renderAll();
}

/* ---------------------------------------------------------------------
   11. PAYER DECISION LOGIC (auto steps)
   --------------------------------------------------------------------- */
function runPayerDecision(stepId){
  const def = STEPS[stepId];
  const d = addDays(def.dayCost);
  const sc = state.scenario;

  // compute completeness bonus from checked docs/criteria history (approximate via efficiency)
  let chance = sc.baseApprovalChance;
  // documentation & necessity thoroughness nudges the odds
  const docBonus = 0.15; // already required to be complete to have advanced this far
  chance += docBonus;
  // efficiency penalty from repeated pends reduces payer patience slightly in this simulation
  chance -= state.pendCount * 0.05;
  chance = Math.max(0.1, Math.min(0.92, chance));

  const roll = Math.random();
  let outcomeId;

  if(stepId === 'payer_review'){
    if(roll < chance){
      outcomeId = 'payer_approved';
    } else if(roll < chance + 0.25){
      outcomeId = 'payer_pend';
      state.pendCount++;
      state.efficiency -= 10;
    } else {
      outcomeId = 'payer_denied';
      state.efficiency -= 20;
    }
  } else if(stepId === 'payer_review2'){
    // no more pends allowed — approve or deny
    outcomeId = (roll < chance + 0.15) ? 'payer_approved' : 'payer_denied';
    if(outcomeId === 'payer_denied') state.efficiency -= 15;
  } else if(stepId === 'payer_review_final'){
    // post-appeal / peer-to-peer: better odds because of physician advocacy
    const finalChance = Math.min(0.9, chance + 0.25);
    outcomeId = (Math.random() < finalChance) ? 'payer_approved' : 'payer_denied';
    if(outcomeId === 'payer_denied') state.efficiency -= 10;
  }

  logSummary(`${def.title}: outcome = ${STEPS[outcomeId].title.replace(/[^\w\s]/g,'').trim()} (+${d} day${d===1?'':'s'}).`);
  showEducation(def, outcomeId);
  pushStep(outcomeId);
  renderAll();

  // Immediately determine what happens after the outcome reveal (auto-continue path)
  setTimeout(()=> resolveOutcome(outcomeId), 900);
}

function resolveOutcome(outcomeId){
  if(outcomeId === 'payer_approved'){
    state.finalOutcome = 'approved';
    finishGame();
    return;
  }
  if(outcomeId === 'payer_denied'){
    if(!state.appealed && state.path.filter(p=>p.id==='payer_review_final').length===0 && state.pendCount>=0 && !hasPassedAppealAlready()){
      // route to appeal if this is the FIRST denial (not the post-appeal final denial)
      if(state.currentStepId === 'payer_denied' && !hasReachedFinal()){
        pushStep('provider_appeal');
        state.appealed = true;
        renderAll();
        return;
      }
    }
    state.finalOutcome = 'denied';
    finishGame();
    return;
  }
  if(outcomeId === 'payer_pend'){
    pushStep('provider_addl_docs');
    renderAll();
  }
}

function hasPassedAppealAlready(){
  return state.path.some(p=>p.id==='provider_appeal');
}
function hasReachedFinal(){
  return state.path.some(p=>p.id==='payer_review_final');
}

/* ---------------------------------------------------------------------
   12. EDUCATION PANEL
   --------------------------------------------------------------------- */
function showEducation(def, outcomeId){
  let text = def.education(state.scenario, state);
  if(outcomeId){
    text = STEPS[outcomeId].education(state.scenario, state);
  }
  el.eduPanel.innerHTML = `<h4>📘 What just happened</h4><p>${text}</p>`;
  el.eduPanel.classList.add('show');
}

/* ---------------------------------------------------------------------
   13. FULL RENDER
   --------------------------------------------------------------------- */
function renderAll(){
  renderStats();
  renderTracker();
  renderBoard();
  renderActionPanel();
  renderGhostTarget();
}

/* ---------------------------------------------------------------------
   14. GAME COMPLETION / SUMMARY
   --------------------------------------------------------------------- */
function finishGame(){
  const approved = state.finalOutcome === 'approved';
  if(approved){
    launchConfetti();
  }

  const totalSteps = state.path.length;
  const eff = Math.max(0, Math.round(state.efficiency));

  let html = `
    <h2>${approved ? '🎉 Prior Authorization Approved!' : '⚠️ Final Determination: Denied'}</h2>
    <p style="color:var(--blue-800);font-size:14px;">${state.scenario.emoji} ${state.scenario.name} — case complete.</p>
    <div class="summary-grid">
      <div class="summary-stat"><div class="num">${state.days}</div><div class="lbl">Total Days Elapsed</div></div>
      <div class="summary-stat"><div class="num">${eff}</div><div class="lbl">Efficiency Score</div></div>
      <div class="summary-stat"><div class="num">${totalSteps}</div><div class="lbl">Workflow Steps</div></div>
      <div class="summary-stat"><div class="num">${state.pendCount}</div><div class="lbl">Times Pended</div></div>
    </div>
    <h3 style="text-align:left;max-width:640px;margin:0 auto;">Workflow Log</h3>
    <ul id="summaryLog">${state.logForSummary.map(l=>`<li>• ${l}</li>`).join('')}</ul>
    <div class="btn-row" style="justify-content:center;display:flex;gap:12px;margin-top:20px;">
      <button id="restartBtn">🔄 New Patient / Restart</button>
    </div>
  `;
  el.summary.innerHTML = html;
  el.summary.style.display = 'block';
  el.workflowWrap.style.display = 'none';

  document.getElementById('restartBtn').addEventListener('click', renderScenarioPicker);
}

/* ---------------------------------------------------------------------
   15. CONFETTI CELEBRATION
   --------------------------------------------------------------------- */
function launchConfetti(){
  const colors = ['#2e86de','#5fa8ef','#1c6bb8','#9ac9f5','#0b2545','#ffffff'];
  for(let i=0;i<80;i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random()*100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDuration = (2.5 + Math.random()*2) + 's';
    piece.style.width = (6+Math.random()*6)+'px';
    piece.style.height = (10+Math.random()*10)+'px';
    piece.style.transform = `rotate(${Math.random()*360}deg)`;
    el.confetti.appendChild(piece);
    setTimeout(()=> piece.remove(), 5000);
  }
}

/* ---------------------------------------------------------------------
   16. GLOBAL DRAG PERMISSIONS (allow dragover across whole board so drop
   only succeeds on the correct ghost target, giving clear visual feedback
   for invalid drops elsewhere on the board)
   --------------------------------------------------------------------- */
document.addEventListener('dragover', e=>{
  if(e.target.closest('#board')) e.preventDefault();
});
document.addEventListener('drop', e=>{
  if(e.target.closest('.slot')) return; // handled by slot's own listener
  if(e.target.closest('#board')) e.preventDefault();
});

/* ---------------------------------------------------------------------
   17. BOOT
   --------------------------------------------------------------------- */
renderScenarioPicker();

</script>
</body>
</html>
