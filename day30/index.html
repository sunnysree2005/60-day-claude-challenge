  ["Japan", "South Korea", "Australia"],

];

const DEMAND_LEVELS = [

  { name: "Seasonal", desc: "demand spikes sharply around certain seasons or holidays" },
  { name: "Volatile / Trend-driven", desc: "demand can surge or crash quickly based on trends" },
];

function randOf(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function generateCompany(){
  const industry = randOf(INDUSTRIES);
  const countries = randOf(COUNTRY_POOLS);
  const demand = randOf(DEMAND_LEVELS);

  const companyName = `${randOf(namePrefixes)} ${randOf(nameSuffixes)}`;

  return {
    companyName,
    icon: industry.icon,
    industry: industry.name,
    product: productLine,
    countries,
    demand,

/* ---------------------------------------------------------

   Cost and Risk, where lower is better. We display them as

--------------------------------------------------------- */

const BASE_METRICS = {
  cost: 50,
  speed: 50,
  risk: 50,
  csat: 50,
  sustainability: 50,
};

function clamp(v){ return Math.max(0, Math.min(100, v)); }

function applyDelta(metrics, delta){
  const next = { ...metrics };
  Object.keys(delta).forEach(k => {
    next[k] = clamp(next[k] + delta[k]);
  });
  return next;

/* ---------------------------------------------------------
   SCORING & DASHBOARD LOGIC
--------------------------------------------------------- */

function computeOverallScore(metrics){
  // Cost and Risk are "lower is better" so we invert them for scoring purposes.
  const costScore = 100 - metrics.cost;
  const riskScore = 100 - metrics.risk;
  const weighted = (
    costScore * 0.22 +
    metrics.speed * 0.22 +
    riskScore * 0.22 +
    metrics.csat * 0.20 +
    metrics.sustainability * 0.14
  );
  return Math.round(clamp(weighted));
}

function metricLabel(key){
  return {
    cost: "Cost",
    speed: "Delivery Speed",
    risk: "Risk",
    csat: "Customer Satisfaction",
    sustainability: "Sustainability"
  }[key];
}

function metricGoodDirection(key){
  // returns true if higher = better
  return key !== "cost" && key !== "risk";
}

function buildDashboard(metrics, choices, company){
  const entries = Object.keys(metrics).map(k => ({
    key: k,
    value: metrics[k],
    good: metricGoodDirection(k),
    // "goodness" score normalized so higher is always better for ranking
    goodness: metricGoodDirection(k) ? metrics[k] : 100 - metrics[k]
  }));

  const sorted = [...entries].sort((a,b) => b.goodness - a.goodness);
  const strengths = sorted.slice(0, 2).map(e => metricLabel(e.key));
  const weaknesses = sorted.slice(-2).map(e => metricLabel(e.key));

  // biggest risk narrative based on choices + metrics
  let biggestRisk = "Your supply chain has no single glaring weak point, but keep monitoring supplier reliability as you scale.";
  if (metrics.risk >= 65) {
    biggestRisk = "Your overall risk exposure is high. A disruption at any single node (supplier, factory, or port) could halt operations for weeks.";
  } else if (choices.suppliers === "single" && choices.factory === "offshore") {
    biggestRisk = "You depend on a single offshore supplier and a distant factory. Any political, logistical, or natural disruption in that one region could stop production entirely.";
  } else if (choices.transport === "sea" && choices.inventory === "low") {
    biggestRisk = "You're combining slow sea freight with low inventory. A single delayed shipment could leave you out of stock for weeks.";
  } else if (choices.warehouse === "centralized" && metrics.speed < 45) {
    biggestRisk = "Your centralized warehouse is far from many customers, creating a delivery speed bottleneck and a single point of failure.";
  }

  // improvement suggestions
  const improvements = [];
  if (choices.suppliers === "single") {
    improvements.push("Add a second backup supplier in a different region to reduce single-point-of-failure risk.");
  }
  if (metrics.cost >= 65) {
    improvements.push("Explore renegotiating supplier contracts or shifting to a lower-cost transport mode for non-urgent shipments.");
  }
  if (metrics.sustainability <= 40) {
    improvements.push("Shift a portion of shipments from air to rail or sea to cut your carbon footprint without sacrificing all speed.");
  }
  if (metrics.speed <= 40) {
    improvements.push("Add a regional warehouse or switch part of your transport mix to faster methods for your top markets.");
  }
  if (metrics.risk >= 55 && improvements.length < 3) {
    improvements.push("Increase safety stock on your best-selling product to buffer against supply disruptions.");
  }
  if (metrics.csat <= 45 && improvements.length < 3) {
    improvements.push("Prioritize faster delivery or more transparent tracking communication to improve customer satisfaction.");
  }
  while (improvements.length < 3) {
    improvements.push("Continuously monitor your key metrics quarterly and re-balance strategy as demand patterns shift.");
  }

  return {
    strengths,
    weaknesses,
    biggestRisk,
    improvements: improvements.slice(0,3),
    score: computeOverallScore(metrics)
  };
}

function generateFeedback(step, choice){
  const d = choice.delta;
  const parts = [];
  if (d.cost !== 0) parts.push(`cost ${d.cost > 0 ? "rose" : "fell"} by ${Math.abs(d.cost)} points`);
  if (d.speed !== 0) parts.push(`delivery speed ${d.speed > 0 ? "improved" : "dropped"} by ${Math.abs(d.speed)} points`);
  if (d.risk !== 0) parts.push(`risk ${d.risk > 0 ? "increased" : "decreased"} by ${Math.abs(d.risk)} points`);
  if (d.csat !== 0) parts.push(`customer satisfaction ${d.csat > 0 ? "went up" : "went down"} by ${Math.abs(d.csat)} points`);
  if (d.sustainability !== 0) parts.push(`sustainability ${d.sustainability > 0 ? "improved" : "worsened"} by ${Math.abs(d.sustainability)} points`);

  const joined = parts.length > 0
    ? parts.join(", ") + "."
    : "your metrics stayed roughly balanced.";

  return `Because you chose "${choice.label}," ${joined} In the real world, this is exactly the kind of trade-off supply chain managers weigh every day — there's rarely a perfect option, only the option that best fits your company's priorities.`;
}

function ScoreCircle({ score }){
  const radius = 70;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (score/100) * circumference;
  let color = "#ff5c6c";
  if (score >= 70) color = "#2ecc8f";
  else if (score >= 45) color = "#f5a623";

  return (
    <div className="score-circle">
      <svg width="170" height="170">
        <circle cx="85" cy="85" r={radius} stroke="#1b2434" strokeWidth="14" fill="none" />
        <circle
          cx="85" cy="85" r={radius}
          stroke={color}
          strokeWidth="14"
          fill="none"
          strokeDasharray={circumference}
          strokeDashoffset={offset}
          strokeLinecap="round"
          style={{ transition: "stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)" }}
        />
      </svg>
      <div className="score-number">
        <div className="n" style={{color}}>{score}</div>
        <div className="l">/ 100</div>
      </div>
    </div>
  );
}

function App(){
  // phases: welcome, companyIntro, step, feedback, dashboard
  const [phase, setPhase] = useState("welcome");
  const [company, setCompany] = useState(null);
  const [stepIndex, setStepIndex] = useState(0);
  const [metrics, setMetrics] = useState(BASE_METRICS);
  const [choices, setChoices] = useState({});
  const [lastChoice, setLastChoice] = useState(null);

  const startCompany = () => {
    setCompany(generateCompany());
    setPhase("companyIntro");
  };

  const beginBuilding = () => {
    setStepIndex(0);
    setMetrics(BASE_METRICS);
    setChoices({});
    setPhase("step");
  };

  const handleChoose = (stepKey, option) => {
    setMetrics(prev => applyDelta(prev, option.delta));
    setChoices(prev => ({ ...prev, [stepKey]: option.id }));
    setLastChoice(option);
    setPhase("feedback");
  };

  const handleNext = () => {
    const isLast = stepIndex >= STEPS.length - 1;
    if (isLast) {
      setPhase("dashboard");
    } else {
      setStepIndex(prev => prev + 1);
      setPhase("step");
    }
  };

  const handleReplay = () => {
    setCompany(generateCompany());
    setStepIndex(0);
    setMetrics(BASE_METRICS);
    setChoices({});
    setLastChoice(null);
    setPhase("companyIntro");
  };

  return (
    <div className="app">
      <div className="header">
        <Brand />
        {company && phase !== "welcome" && (
          <span className="step-pill">{company.companyName}</span>
        )}
      </div>

      {phase === "welcome" && <Welcome onStart={startCompany} />}

      {phase === "companyIntro" && company && (
        <CompanyIntro company={company} onContinue={beginBuilding} />
      )}

      {phase === "step" && (
        <StepScreen
          step={STEPS[stepIndex]}
          stepIndex={stepIndex}
          totalSteps={STEPS.length}
          metrics={metrics}
          onChoose={handleChoose}
        />
      )}

      {phase === "feedback" && lastChoice && (
        <FeedbackScreen
          step={STEPS[stepIndex]}
          choice={lastChoice}
          metrics={metrics}
          onNext={handleNext}
          isLastStep={stepIndex >= STEPS.length - 1}
        />
      )}

      {phase === "dashboard" && company && (
        <Dashboard
          company={company}
          metrics={metrics}
          choices={choices}
          onReplay={handleReplay}
        />
      )}

      <div className="footer-note">
        Supply Chain Builder — an educational simulation. All companies and data are randomly generated.
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
