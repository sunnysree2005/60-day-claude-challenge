<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Detective</title>
<style>
:root{
  --bg-0:#070b12;
  --bg-1:#0d1420;
  --cork:#16202e;
  --cork-2:#1b2836;
  --panel:#101a26;
  --paper:#f3ead9;
  --paper-2:#e9dfc9;
  --ink:#2a2418;
  --accent:#3fa9f5;
  --accent-2:#7fd4ff;
  --accent-glow: rgba(63,169,245,0.55);
  --gold:#e9c46a;
  --red:#e05d5d;
  --green:#5ed6a5;
  --muted:#7d8ba0;
  --border:#25384a;
  --shadow: 0 20px 60px rgba(0,0,0,0.55);
  --font-head: 'Georgia', 'Times New Roman', serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'Courier New', monospace;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(63,169,245,0.08), transparent 55%),
    radial-gradient(ellipse at 80% 100%, rgba(63,169,245,0.06), transparent 50%),
    var(--bg-0);
  color:#dfe7f0;
  font-family:var(--font-body);
  overflow-x:hidden;
}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--bg-1);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;}

#root{min-height:100vh;display:flex;flex-direction:column;}

.noise-overlay{
  pointer-events:none;
  position:fixed;inset:0;z-index:9999;
  opacity:0.04;
  background-image:
    repeating-linear-gradient(0deg, rgba(255,255,255,0.4) 0px, transparent 1px, transparent 2px),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.15) 0px, transparent 1px, transparent 3px);
  mix-blend-mode:overlay;
}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;
  background:linear-gradient(180deg, rgba(13,20,32,0.95), rgba(13,20,32,0.75));
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(6px);
  position:sticky;top:0;z-index:50;
}
.brand{ display:flex;align-items:center;gap:12px; font-family:var(--font-head); letter-spacing:1px; }
.brand-badge{
  width:38px;height:38px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--accent-2), var(--accent) 60%, #143b57 100%);
  box-shadow:0 0 18px var(--accent-glow), inset 0 0 8px rgba(0,0,0,0.4);
  display:flex;align-items:center;justify-content:center; font-size:18px;
}
.brand-title{font-size:20px;font-weight:700;color:var(--paper);}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:-2px;}

.progress-track{
  flex:1;max-width:420px;margin:0 28px;
  height:6px;border-radius:4px;background:rgba(255,255,255,0.06);
  overflow:hidden;position:relative; border:1px solid var(--border);
}
.progress-fill{
  height:100%; background:linear-gradient(90deg, var(--accent), var(--accent-2));
  box-shadow:0 0 10px var(--accent-glow); transition:width 0.6s cubic-bezier(.4,0,.2,1);
}
.stage-label{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;}

.stage{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:36px 20px 80px; position:relative; animation:fadeIn 0.6s ease both;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.section-title{
  font-family:var(--font-head); font-size:34px;color:var(--paper);
  text-align:center;margin:0 0 6px; text-shadow:0 0 24px rgba(63,169,245,0.25);
}
.section-sub{
  color:var(--muted);text-align:center;margin:0 0 32px;
  font-size:14px;letter-spacing:0.5px;max-width:640px;
}

.btn{
  font-family:var(--font-body); border:1px solid var(--border);
  background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.15));
  color:var(--paper); padding:12px 26px;border-radius:8px;
  cursor:pointer;font-size:14px;font-weight:600;letter-spacing:0.5px;
  transition:all 0.25s ease; position:relative;overflow:hidden;
}
.btn:hover{ border-color:var(--accent); box-shadow:0 0 22px var(--accent-glow); transform:translateY(-2px); }
.btn:active{transform:translateY(0);}
.btn-primary{
  background:linear-gradient(180deg, var(--accent), #1c73ab);
  border-color:var(--accent-2);color:#04121d;font-weight:700;
}
.btn-primary:hover{box-shadow:0 0 28px var(--accent-glow);}
.btn-ghost{background:transparent;}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}

.theme-grid{display:flex;gap:22px;flex-wrap:wrap;justify-content:center;max-width:820px;}
.theme-card{
  width:180px;padding:20px 16px;border-radius:14px;
  background:var(--cork);border:2px solid var(--border);
  cursor:pointer;text-align:center;transition:all 0.3s ease; position:relative;
}
.theme-card:hover{transform:translateY(-6px);box-shadow:var(--shadow);}
.theme-card.active{border-color:var(--accent);box-shadow:0 0 26px var(--accent-glow);}
.theme-swatches{display:flex;gap:6px;justify-content:center;margin-bottom:12px;}
.swatch{width:24px;height:24px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);}
.theme-name{font-weight:700;font-size:14px;color:var(--paper);}
.theme-desc{font-size:11px;color:var(--muted);margin-top:4px;}

.folder{
  width:100%;max-width:620px; background:var(--paper); color:var(--ink);
  border-radius:4px; padding:36px 40px;
  box-shadow:var(--shadow), 0 0 0 6px rgba(0,0,0,0.15);
  position:relative; transform:rotate(-0.6deg);
  background-image: linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px);
  background-size:100% 28px;
}
.folder::before{
  content:'CLASSIFIED'; position:absolute;top:14px;right:-30px;
  background:var(--red);color:#fff;font-size:10px;font-weight:700;
  padding:4px 40px;transform:rotate(35deg);letter-spacing:2px;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
}
.stamp{
  display:inline-block;border:3px solid var(--red);color:var(--red);
  font-family:var(--font-mono);font-weight:700;font-size:13px;
  padding:4px 14px;border-radius:6px;transform:rotate(-8deg);
  letter-spacing:2px;margin-bottom:14px;opacity:0.85;
}
.folder h2{font-family:var(--font-head);font-size:26px;margin:6px 0 2px;}
.folder .industry-tag{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#6b5b3d;font-weight:700;}
.folder p{line-height:1.6;font-size:14.5px;margin:14px 0;}
.folder .divider{border:none;border-top:1.5px dashed #b8ab8a;margin:20px 0;}
.folder .meta-line{font-family:var(--font-mono);font-size:12.5px;color:#5a5140;margin:4px 0;}
.folder-actions{display:flex;justify-content:center;margin-top:26px;}

.corkboard{
  width:100%;max-width:1100px;
  background: radial-gradient(circle at 15% 15%, rgba(255,255,255,0.03), transparent 40%), var(--cork);
  border:14px solid #2a1a10;
  border-image: linear-gradient(160deg,#3a2416,#1d130b) 1;
  border-radius:10px; box-shadow:var(--shadow); padding:36px; position:relative;
  background-image: radial-gradient(rgba(0,0,0,0.15) 1px, transparent 1px);
  background-size:14px 14px;
}
.board-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:28px; }
.evidence-card{
  background:var(--paper);color:var(--ink);
  padding:18px 18px 22px;border-radius:2px;
  box-shadow:0 10px 20px rgba(0,0,0,0.45);
  position:relative;cursor:grab;
  transition:transform 0.25s ease, box-shadow 0.25s ease;
  font-size:13px;line-height:1.5; min-height:150px;
}
.evidence-card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 18px 34px rgba(0,0,0,0.55), 0 0 18px var(--accent-glow);}
.evidence-card.dragging{opacity:0.5;cursor:grabbing;}
.pin{
  position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  width:16px;height:16px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ff8a8a, var(--red) 70%);
  box-shadow:0 3px 6px rgba(0,0,0,0.5);
}
.evidence-title{font-weight:700;font-size:13.5px;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;color:#4a3f2b;}
.evidence-body{white-space:pre-line;}
.sticky{ background:var(--gold); transform:rotate(-2deg); }
.sticky:nth-child(even){transform:rotate(2deg); background:#e8b4b4;}
.sticky:nth-child(3n){background:#a9d6c4;}

.metrics-strip{ display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:14px;margin:26px 0; }
.metric-box{ background:var(--panel);border:1px solid var(--border); border-radius:10px;padding:14px;text-align:center; }
.metric-val{font-size:22px;font-weight:800;color:var(--accent-2);font-family:var(--font-mono);}
.metric-lbl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.bar-wrap{width:100%;height:6px;background:rgba(255,255,255,0.08);border-radius:4px;margin-top:8px;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1);}

.section-block{
  width:100%;max-width:1100px;background:var(--panel);
  border:1px solid var(--border);border-radius:14px;
  padding:26px 30px;margin-bottom:24px;
}
.section-block h3{
  font-family:var(--font-head);color:var(--accent-2);font-size:18px;
  margin:0 0 14px;display:flex;align-items:center;gap:8px;
}

.suspect-grid{ display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px;width:100%;max-width:900px; }
.suspect-card{
  background:var(--panel);border:2px solid var(--border);
  border-radius:12px;padding:18px;cursor:pointer;
  transition:all 0.25s ease;font-size:13.5px;line-height:1.5;
}
.suspect-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 0 20px var(--accent-glow);}
.suspect-card.selected{border-color:var(--gold);background:rgba(233,196,106,0.08);box-shadow:0 0 20px rgba(233,196,106,0.35);}
.suspect-card h4{margin:0 0 8px;color:var(--paper);font-size:15px;}

.stamp-anim{
  font-family:var(--font-head);font-size:64px;font-weight:900;
  color:var(--red);border:6px solid var(--red);border-radius:12px;
  padding:10px 40px;letter-spacing:4px;
  transform:scale(2.4) rotate(-10deg);opacity:0;
  animation:stampIn 0.7s cubic-bezier(.2,1.4,.4,1) forwards;
  box-shadow:0 0 60px rgba(224,93,93,0.4);
}
@keyframes stampIn{
  0%{transform:scale(3) rotate(-16deg);opacity:0;}
  60%{transform:scale(0.95) rotate(-6deg);opacity:1;}
  100%{transform:scale(1) rotate(-6deg);opacity:1;}
}
.confetti{ position:fixed;top:-20px;width:8px;height:14px; animation:fall linear forwards;z-index:10; }
@keyframes fall{ to{transform:translateY(110vh) rotate(720deg);opacity:0.2;} }

.report-card{
  width:100%;max-width:760px;background:var(--paper);color:var(--ink);
  border-radius:8px;padding:34px 40px;box-shadow:var(--shadow);
}
.report-card h2{font-family:var(--font-head);margin-top:0;}
.report-section{margin-bottom:20px;}
.report-section h4{
  text-transform:uppercase;letter-spacing:1.5px;font-size:12px;
  color:#6b5b3d;margin-bottom:6px;border-bottom:1.5px solid #d8caa6;padding-bottom:4px;
}
.grade-badge{
  display:inline-block;font-family:var(--font-mono);font-size:28px;font-weight:800;
  border:3px solid var(--ink);border-radius:50%;width:64px;height:64px;
  line-height:58px;text-align:center;margin-right:16px;
}
.result-banner{
  padding:14px 22px;border-radius:10px;margin-bottom:20px;font-weight:700;
  text-align:center;font-size:15px;
}
.result-correct{background:rgba(94,214,165,0.15);border:1px solid var(--green);color:var(--green);}
.result-wrong{background:rgba(224,93,93,0.15);border:1px solid var(--red);color:var(--red);}
.footer-nav{display:flex;gap:14px;justify-content:center;margin-top:30px;flex-wrap:wrap;}

@media (max-width:640px){
  .topbar{flex-direction:column;gap:10px;padding:14px;}
  .progress-track{margin:0;width:100%;max-width:none;}
  .folder{padding:24px 20px;}
  .section-title{font-size:26px;}
  .corkboard{padding:18px;border-width:8px;}
}
</style>
</head>
<body>
<div class="noise-overlay"></div>
<div id="root"></div>

<script>
const THEMES = {
  claude: { name:"Claude Orange", desc:"Warm amber noir", accent:"#e07a3f", accent2:"#f4a465", glow:"rgba(224,122,63,0.55)", swatches:["#e07a3f","#0d1420","#f4a465"] },
  noir: { name:"Noir Blue", desc:"Classic midnight detective", accent:"#3fa9f5", accent2:"#7fd4ff", glow:"rgba(63,169,245,0.55)", swatches:["#3fa9f5","#0d1420","#7fd4ff"] },
  crimson: { name:"Crimson Case File", desc:"High-stakes red alert", accent:"#e05d5d", accent2:"#ff9b9b", glow:"rgba(224,93,93,0.55)", swatches:["#e05d5d","#0d1420","#ff9b9b"] },
  emerald: { name:"Emerald Stakeout", desc:"Cool nocturnal green", accent:"#3fd6a1", accent2:"#8fffd4", glow:"rgba(63,214,161,0.5)", swatches:["#3fd6a1","#0d1420","#8fffd4"] }
};

function applyTheme(key){
  const t = THEMES[key];
  const r = document.documentElement.style;
  r.setProperty('--accent', t.accent);
  r.setProperty('--accent-2', t.accent2);
  r.setProperty('--accent-glow', t.glow);
}

const CASES = [
{
  company:"Loomlight Skincare", industry:"Beauty & Cosmetics",
  objective:"Launch a new anti-aging serum and drive 10,000 first-time purchases in Q1.",
  audience:"Women aged 35-55, mid-to-high income, urban, skincare-conscious.",
  channels:["Instagram Ads","Influencer Seeding","Email","Google Search"],
  budget:{"Instagram Ads":45,"Influencer Seeding":30,"Email":10,"Google Search":15},
  metrics:{reach:"1.2M", ctr:"0.4%", engagement:"2.1%", conversions:"310", sales:"$28,400"},
  comments:[
    "The influencers all look like they're 22, not the target demo at all.",
    "I saw this ad 15 times this week, I still don't know what the serum actually does.",
    "Beautiful photos but I have no idea what makes this different from my current serum."
  ],
  social:{"Likes":"12,400","Comments":"180","Shares":"64","Sentiment":"Neutral-Confused"},
  mistake:"The influencer casting skewed decades younger than the target audience, undermining message relevance and trust for the core 35-55 buyer.",
  clues:[
    "Influencer follower demographics show 68% aged 18-24.",
    "Comment sentiment repeatedly says 'not for me' or 'not my age group'.",
    "CTR is high on awareness but conversion rate is far below industry benchmark for beauty (1.8%)."
  ],
  explanation:"Loomlight built broad reach using popular young influencers, but the campaign never resonated with the actual buyer because the faces, tone, and language of the creators didn't reflect or speak to that demographic, creating a disconnect between impressions and purchase intent.",
  improvements:[
    "Recast influencer roster with creators genuinely in the 35-55 range with credibility in mature skincare.",
    "Add before/after proof points and ingredient education to ad creative.",
    "Run a retargeting sequence with testimonials from age-matched customers."
  ]
},
{
  company:"PulseFit Wearables", industry:"Consumer Tech / Fitness",
  objective:"Drive pre-orders for a new fitness tracker via a 6-week hype campaign.",
  audience:"Fitness enthusiasts aged 22-40, tech-savvy, active on social media.",
  channels:["TikTok Ads","YouTube Pre-roll","Email","Affiliate/Referral"],
  budget:{"TikTok Ads":50,"YouTube Pre-roll":20,"Email":10,"Affiliate/Referral":20},
  metrics:{reach:"3.4M", ctr:"1.9%", engagement:"6.4%", conversions:"890", sales:"$142,000"},
  comments:[
    "Pre-ordered two weeks ago and haven't heard anything since — is my order even real?",
    "The checkout page crashed on my phone twice before I gave up.",
    "Great ads, but the site felt like an afterthought."
  ],
  social:{"Likes":"88,000","Comments":"3,200","Shares":"5,600","Sentiment":"Positive to Frustrated"},
  mistake:"High-performing ad creative drove massive traffic, but the mobile checkout experience was not stress-tested, causing a severe drop-off between click and completed purchase.",
  clues:[
    "Mobile conversion rate is 70% lower than desktop conversion rate.",
    "Cart abandonment spikes precisely at the payment step on mobile devices.",
    "Customer service tickets mention 'page froze' or 'error at checkout' repeatedly."
  ],
  explanation:"PulseFit nailed audience targeting and creative virality, generating strong top-of-funnel results, but a broken mobile checkout flow silently sabotaged the bottom of the funnel, turning excited clickers into frustrated abandoners.",
  improvements:[
    "Audit and rebuild the mobile checkout flow with load testing under peak traffic.",
    "Add a one-click or guest checkout option to reduce friction.",
    "Send proactive order-confirmation and shipping-status emails to rebuild trust."
  ]
},
{
  company:"Harvest & Home Meal Kits", industry:"Food & Beverage / Subscription",
  objective:"Increase subscriber retention after the first month by 25%.",
  audience:"Busy professionals and young families aged 28-45 seeking convenient home cooking.",
  channels:["Facebook Ads","Email","Direct Mail","Podcast Sponsorships"],
  budget:{"Facebook Ads":35,"Email":25,"Direct Mail":20,"Podcast Sponsorships":20},
  metrics:{reach:"860K", ctr:"1.1%", engagement:"3.0%", conversions:"640", sales:"$96,000"},
  comments:[
    "Loved the first two boxes, then suddenly I never heard from them again until the renewal charge.",
    "I forgot I was even subscribed until the third box showed up.",
    "No tips, no recipes follow-up, nothing — felt like they got my money and moved on."
  ],
  social:{"Likes":"5,100","Comments":"210","Shares":"90","Sentiment":"Mixed"},
  mistake:"There was no post-purchase engagement or onboarding sequence after the initial sale, leaving customers disengaged until the renewal billing, which drove cancellations.",
  clues:[
    "Churn spikes precisely at day 30, aligned with the first billing renewal.",
    "Email open rates drop to near-zero between order confirmation and renewal notice.",
    "Customer comments describe feeling 'forgotten' after signing up."
  ],
  explanation:"Harvest & Home invested heavily in acquisition channels but built no nurture or retention journey after the first purchase, so new subscribers received no reason to stay engaged and simply cancelled once the novelty faded.",
  improvements:[
    "Build a 30-day onboarding email/SMS series with recipe tips and engagement hooks.",
    "Send a pre-renewal check-in with a discount or pause option instead of a silent charge.",
    "Introduce a loyalty or referral program to boost month-2 engagement."
  ]
},
{
  company:"Vantix Business Software", industry:"B2B SaaS",
  objective:"Generate 500 qualified demo bookings for a new project-management tool.",
  audience:"Operations managers and team leads at mid-size companies (50-500 employees).",
  channels:["LinkedIn Ads","Google Search","Webinars","Cold Email"],
  budget:{"LinkedIn Ads":40,"Google Search":25,"Webinars":20,"Cold Email":15},
  metrics:{reach:"410K", ctr:"0.8%", engagement:"1.4%", conversions:"120", sales:"$0 (pre-sale demos)"},
  comments:[
    "The landing page talked about 'synergistic workflow enablement' for three paragraphs and I still don't know what the product does.",
    "I clicked the ad hoping for a free trial, but the page insisted on a 30-minute sales call first.",
    "Every feature is described with buzzwords instead of plain examples."
  ],
  social:{"Likes":"640","Comments":"38","Shares":"12","Sentiment":"Confused"},
  mistake:"The landing page and ad copy were dense with vague corporate jargon, so prospects couldn't quickly understand the product's tangible value, leading to poor demo conversion despite decent traffic.",
  clues:[
    "Average time-on-page is under 9 seconds, well below the 45-second benchmark for high-intent B2B pages.",
    "Heatmaps show visitors leaving before reaching the demo-booking CTA.",
    "Sales team reports prospects on calls asking 'so what does this actually do?'"
  ],
  explanation:"Vantix's messaging prioritized sounding sophisticated over being clear, using abstract jargon instead of concrete before/after use cases, which confused visitors and caused them to bounce before ever considering a demo.",
  improvements:[
    "Rewrite landing page copy around one plain-language use case with a short demo video.",
    "Offer a self-serve free trial alongside the sales-call option to reduce friction.",
    "A/B test jargon-heavy copy against plain-benefit copy to validate the fix."
  ]
},
{
  company:"BrightPath Learning", industry:"EdTech",
  objective:"Sell 2,000 seats of an online coding bootcamp in a single launch window.",
  audience:"Career-changers aged 24-38 looking to enter tech.",
  channels:["YouTube Ads","Instagram Ads","Retargeting","Email"],
  budget:{"YouTube Ads":30,"Instagram Ads":30,"Retargeting":25,"Email":15},
  metrics:{reach:"2.1M", ctr:"1.6%", engagement:"4.2%", conversions:"1,340", sales:"$1,072,000"},
  comments:[
    "The ad said 'guaranteed job in 90 days' but the enrollment page fine print tells a very different story.",
    "Felt misled — the testimonials in the ad don't match what's actually included in the course.",
    "I want to love this program but the marketing oversold it hard."
  ],
  social:{"Likes":"41,000","Comments":"2,900","Shares":"800","Sentiment":"Increasingly Negative"},
  mistake:"Ad copy made aggressive, unsubstantiated guarantees ('guaranteed job') that weren't reflected in the actual program terms, creating a trust breakdown once customers reached the fine print or graduated.",
  clues:[
    "Refund requests spike specifically citing 'not as advertised'.",
    "Public comment threads quote the ad's guarantee language almost verbatim as a complaint.",
    "Legal/compliance flags rise sharply in the week after launch."
  ],
  explanation:"BrightPath's launch generated huge short-term sales by using an emotionally compelling but exaggerated promise, but the gap between the marketing claim and the real program terms caused a wave of distrust, refunds, and reputational damage that undercut long-term growth.",
  improvements:[
    "Replace absolute guarantees with honest, data-backed outcome statistics (e.g., '78% placement within 6 months').",
    "Align legal/compliance review with marketing claims before launch.",
    "Set clear expectations in-ad and on the enrollment page to reduce refund-driving surprises."
  ]
},
{
  company:"Northshore Outdoor Gear", industry:"Retail / E-commerce",
  objective:"Clear seasonal inventory with a flash sale driving $200K in 72 hours.",
  audience:"Outdoor and camping enthusiasts aged 25-55.",
  channels:["Email","SMS","Facebook Ads","Display Retargeting"],
  budget:{"Email":30,"SMS":20,"Facebook Ads":35,"Display Retargeting":15},
  metrics:{reach:"640K", ctr:"2.4%", engagement:"5.0%", conversions:"2,100", sales:"$178,000"},
  comments:[
    "Got 11 texts in three days about this sale. I unsubscribed after the 4th.",
    "Every email had a different 'final hours' countdown that kept resetting — sketchy.",

function shuffle(arr){ return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]); }
function parseMetricNum(str){ const n = parseFloat(String(str).replace(/[^0-9.]/g,'')); return isNaN(n)?0:n; }

function buildSuspects(caseObj, allCases){
  const others = allCases.filter(c=>c.company!==caseObj.company);
  const distractors = shuffle(others).slice(0,3).map(c=>c.mistake);
  return shuffle([caseObj.mistake, ...distractors]);
}

const root = document.getElementById('root');

let STATE = {
  stage: 'theme',
  themeKey: 'noir',
  currentCase: null,
  suspectOptions: [],
  selectedSuspect: null,
  isCorrect: null,
  visitedClues: new Set()
};

const STAGE_ORDER = ['theme','assign','board','investigate','solve','closed','report'];
const STAGE_LABELS = {
  theme:"Choose Theme", assign:"Case Assignment", board:"Investigation Board",
  investigate:"Investigation", solve:"Solve the Case", closed:"Case Closed", report:"Learning Report"
};

function setStage(s){ STATE.stage = s; render(); window.scrollTo({top:0, behavior:'smooth'}); }

function startNewCase(){
  const c = CASES[Math.floor(Math.random()*CASES.length)];
  STATE.currentCase = c;
  STATE.suspectOptions = buildSuspects(c, CASES);
  STATE.selectedSuspect = null;
  STATE.isCorrect = null;
  STATE.visitedClues = new Set();
  setStage('assign');
}

function el(tag, attrs={}, children=[]){
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class') e.className=v;
    else if(k==='html') e.innerHTML=v;
    else if(k.startsWith('on') && typeof v==='function') e.addEventListener(k.slice(2), v);
    else e.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    if(typeof c==='string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}

function renderTopbar(){
  const idx = STAGE_ORDER.indexOf(STATE.stage);
  const pct = Math.round((idx/(STAGE_ORDER.length-1))*100);
  return el('div',{class:'topbar'},[
    el('div',{class:'brand'},[
      el('div',{class:'brand-badge'},'🕵️'),
      el('div',{},[
        el('div',{class:'brand-title'},'Marketing Detective'),
        el('div',{class:'brand-sub'},'Case Files Division')
      ])
    ]),
    el('div',{class:'progress-track'},[ el('div',{class:'progress-fill', style:'width:'+pct+'%'}) ]),
    el('div',{class:'stage-label'}, STAGE_LABELS[STATE.stage])
  ]);
}

function renderThemeStage(){
  const wrap = el('div',{class:'stage'});
  wrap.appendChild(el('h1',{class:'section-title'},'Select Your Case Board Theme'));
  wrap.appendChild(el('p',{class:'section-sub'},'Every good detective sets the mood before opening the file. Pick the aesthetic for your investigation.'));
  const grid = el('div',{class:'theme-grid'});
  Object.entries(THEMES).forEach(([key,t])=>{
    const card = el('div',{class:'theme-card'+(STATE.themeKey===key?' active':''), onclick:()=>{ STATE.themeKey = key; applyTheme(key); render(); }},[
      el('div',{class:'theme-swatches'}, t.swatches.map(sw=>el('div',{class:'swatch', style:'background:'+sw}))),
      el('div',{class:'theme-name'}, t.name),
      el('div',{class:'theme-desc'}, t.desc)
    ]);
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
  wrap.appendChild(el('button',{class:'btn btn-primary', style:'margin-top:32px;', onclick:()=>startNewCase()},'Confirm Theme & Open First Case →'));
  return wrap;
}

function renderAssignStage(){
  const c = STATE.currentCase;
  const wrap = el('div',{class:'stage'});
  wrap.appendChild(el('h1',{class:'section-title'},'Case Assignment'));
  wrap.appendChild(el('p',{class:'section-sub'},"A new file has landed on your desk. Read carefully — something went wrong with this campaign, and it's your job to find out what."));

  const folder = el('div',{class:'folder'});
  folder.appendChild(el('div',{class:'stamp'},'CASE OPEN'));
  folder.appendChild(el('h2',{},c.company));
  folder.appendChild(el('div',{class:'industry-tag'},c.industry));
  folder.appendChild(el('hr',{class:'divider'}));
  folder.appendChild(el('div',{class:'meta-line'},'OBJECTIVE: ' + c.objective));
  folder.appendChild(el('div',{class:'meta-line'},'TARGET AUDIENCE: ' + c.audience));
  folder.appendChild(el('p',{},'The client swears the strategy was sound. The numbers tell a different story. Something in this campaign is hiding a costly mistake — and three clues on the board point straight to it.'));
  folder.appendChild(el('div',{class:'folder-actions'}, el('button',{class:'btn btn-primary', onclick:()=>setStage('board')},'Open the Investigation Board →')));
  wrap.appendChild(folder);
  return wrap;
}

function renderMetricsStrip(c){
  const strip = el('div',{class:'metrics-strip'});
  const items = [['Reach', c.metrics.reach],['CTR', c.metrics.ctr],['Engagement', c.metrics.engagement],['Conversions', c.metrics.conversions],['Sales', c.metrics.sales]];
  items.forEach(([lbl,val])=>{
    const num = parseMetricNum(val);
    const box = el('div',{class:'metric-box'},[
      el('div',{class:'metric-val'}, val),
      el('div',{class:'metric-lbl'}, lbl),
      el('div',{class:'bar-wrap'}, el('div',{class:'bar-fill', style:'width:0%'}))
    ]);
    strip.appendChild(box);
    setTimeout(()=>{ box.querySelector('.bar-fill').style.width = Math.max(15, Math.min(100, (num % 100) || 60)) + '%'; }, 100);
  });
  return strip;
}

function renderBoardStage(){
  const c = STATE.currentCase;
  const wrap = el('div',{class:'stage'});
  wrap.appendChild(el('h1',{class:'section-title'},'Investigation Board'));
  wrap.appendChild(el('p',{class:'section-sub'},'Pin, drag, and study every piece of evidence. Nothing here is filler — the truth is hiding in plain sight.'));

  const board = el('div',{class:'corkboard'});
  const grid = el('div',{class:'board-grid'});

  function makeCard(title, body, extraClass){
    const card = el('div',{class:'evidence-card '+(extraClass||''), draggable:'true'},[
      el('div',{class:'pin'}),
      el('div',{class:'evidence-title'}, title),
      el('div',{class:'evidence-body'}, body)
    ]);
    card.addEventListener('dragstart', ()=> card.classList.add('dragging'));
    card.addEventListener('dragend', ()=> card.classList.remove('dragging'));
    return card;
  }

  grid.appendChild(makeCard('Marketing Channels', c.channels.map(ch=>'• '+ch).join('\\n')));
  grid.appendChild(makeCard('Budget Allocation', Object.entries(c.budget).map(([k,v])=>k+': '+v+'%').join('\\n')));
  grid.appendChild(makeCard('Customer Comments', c.comments.map(cm=>'"'+cm+'"').join('\\n\\n'), 'sticky'));
  grid.appendChild(makeCard('Social Media Performance', Object.entries(c.social).map(([k,v])=>k+': '+v).join('\\n')));

  board.appendChild(grid);
  board.appendChild(renderMetricsStrip(c));
  wrap.appendChild(board);
  wrap.appendChild(el('button',{class:'btn btn-primary', style:'margin-top:28px;', onclick:()=>setStage('investigate')}, 'Begin Deep Investigation →'));
  return wrap;
}

function renderInvestigateStage(){
  const c = STATE.currentCase;
  const wrap = el('div',{class:'stage'});
  wrap.appendChild(el('h1',{class:'section-title'},'Interactive Investigation'));
  wrap.appendChild(el('p',{class:'section-sub'},'Three supporting clues are pinned below. Click each one to reveal it — you need every clue uncovered before you can make your accusation.'));

  const block = el('div',{class:'section-block', style:'max-width:900px;'});
  block.appendChild(el('h3',{},'🔍 Supporting Clues'));
  const clueGrid = el('div',{class:'board-grid'});

  c.clues.forEach((clue, i)=>{
    const revealed = STATE.visitedClues.has(i);
    const card = el('div',{class:'evidence-card', style:'cursor:pointer;'},[
      el('div',{class:'pin'}),
      el('div',{class:'evidence-title'}, revealed ? ('Clue #'+(i+1)) : ('Clue #'+(i+1)+' — Sealed')),
      el('div',{class:'evidence-body'}, revealed ? clue : 'Click to reveal this piece of evidence...')
    ]);
    card.addEventListener('click', ()=>{ STATE.visitedClues.add(i); render(); });
    clueGrid.appendChild(card);
  });
  block.appendChild(clueGrid);
  wrap.appendChild(block);

  const allRevealed = STATE.visitedClues.size >= c.clues.length;
  wrap.appendChild(el('button',{class:'btn btn-primary', style:'margin-top:10px;', disabled: !allRevealed, onclick:()=>{ if(allRevealed) setStage('solve'); }},
    allRevealed ? 'Proceed to Accusation →' : ('Reveal all clues to continue ('+STATE.visitedClues.size+'/'+c.clues.length+')')));
  return wrap;
}

function renderSolveStage(){
  const c = STATE.currentCase;
  const wrap = el('div',{class:'stage'});
  wrap.appendChild(el('h1',{class:'section-title'},'Solve the Case'));
  wrap.appendChild(el('p',{class:'section-sub'},'Which of these is the true primary marketing mistake? Choose carefully, detective.'));

  const grid = el('div',{class:'suspect-grid'});
  STATE.suspectOptions.forEach((opt)=>{
    const isSel = STATE.selectedSuspect === opt;
    const card = el('div',{class:'suspect-card'+(isSel?' selected':'')},[
      el('h4',{}, isSel ? '🔎 Selected Theory' : 'Theory'),
      el('div',{}, opt)
    ]);
    card.addEventListener('click', ()=>{ STATE.selectedSuspect = opt; render(); });
    grid.appendChild(card);
  });
  wrap.appendChild(grid);

  wrap.appendChild(el('button',{class:'btn btn-primary', style:'margin-top:28px;', disabled: !STATE.selectedSuspect, onclick:()=>{
    STATE.isCorrect = (STATE.selectedSuspect === c.mistake);
    setStage('closed');
  }}, 'Lock In My Accusation →'));
  return wrap;
}

function spawnConfetti(){
  const colors = ['var(--accent)','var(--accent-2)','var(--gold)','var(--green)'];
  for(let i=0;i<60;i++){
    const p = el('div',{class:'confetti', style:'left:'+(Math.random()*100)+'vw;background:'+colors[Math.floor(Math.random()*colors.length)]+';animation-duration:'+(2+Math.random()*2)+'s;animation-delay:'+(Math.random()*0.6)+'s;'});
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 4000);
  }
}

function renderClosedStage(){
  const c = STATE.currentCase;
  const wrap = el('div',{class:'stage', style:'align-items:center;justify-content:center;min-height:60vh;'});
  const banner = el('div',{class:'result-banner ' + (STATE.isCorrect?'result-correct':'result-wrong')},
    STATE.isCorrect ? '✅ Correct! You cracked the case.' : '❌ Not quite — but every good detective learns from a miss.');

  wrap.appendChild(el('div',{class:'stamp-anim'}, STATE.isCorrect ? 'CASE SOLVED' : 'CASE CLOSED'));
  wrap.appendChild(banner);
  wrap.appendChild(el('p',{class:'section-sub'}, 'The full breakdown of "'+c.company+'" awaits in your Learning Report.'));
  wrap.appendChild(el('button',{class:'btn btn-primary', onclick:()=>setStage('report')},'View Learning Report →'));

  if(STATE.isCorrect){ setTimeout(()=>spawnConfetti(), 200); }
  return wrap;
}

function renderReportStage(){
  const c = STATE.currentCase;
  const wrap = el('div',{class:'stage'});
  wrap.appendChild(el('h1',{class:'section-title'},'Learning Report'));
  wrap.appendChild(el('p',{class:'section-sub'},'Case file archived. Here is your full debrief.'));

  const card = el('div',{class:'report-card'});
  const gradeVal = STATE.isCorrect ? 'A' : 'B-';
  card.appendChild(el('div',{style:'display:flex;align-items:center;margin-bottom:10px;'},[
    el('div',{class:'grade-badge'}, gradeVal),
    el('h2',{style:'margin:0;'}, c.company + ' — Case Debrief')
  ]));

  card.appendChild(el('div',{class:'report-section'},[ el('h4',{},'Primary Marketing Mistake'), el('p',{}, c.mistake) ]));
  card.appendChild(el('div',{class:'report-section'},[ el('h4',{},'Correct Explanation'), el('p',{}, c.explanation) ]));
  const impList = el('ul',{});
  c.improvements.forEach(i=>impList.appendChild(el('li',{style:'margin-bottom:6px;'}, i)));
  card.appendChild(el('div',{class:'report-section'},[ el('h4',{},'Suggested Improvements'), impList ]));
  card.appendChild(el('div',{class:'report-section'},[ el('h4',{},'Your Accusation'), el('p',{}, STATE.selectedSuspect) ]));

  wrap.appendChild(card);
  wrap.appendChild(el('div',{class:'footer-nav'},[
    el('button',{class:'btn btn-primary', onclick:()=>startNewCase()},'Investigate Another Case →'),
    el('button',{class:'btn btn-ghost', onclick:()=>setStage('theme')},'Change Theme')
  ]));
  return wrap;
}

function render(){
  root.innerHTML = '';
  root.appendChild(renderTopbar());
  let stageEl;
  switch(STATE.stage){
    case 'theme': stageEl = renderThemeStage(); break;
    case 'assign': stageEl = renderAssignStage(); break;
    case 'board': stageEl = renderBoardStage(); break;
    case 'investigate': stageEl = renderInvestigateStage(); break;
    case 'solve': stageEl = renderSolveStage(); break;
    case 'closed': stageEl = renderClosedStage(); break;
    case 'report': stageEl = renderReportStage(); break;
    default: stageEl = renderThemeStage();
  }
  root.appendChild(stageEl);
}

applyTheme(STATE.themeKey);
render();
</script>
